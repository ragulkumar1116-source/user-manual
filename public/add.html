<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Instrument - Instrument Library V3.0</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .table-responsive { max-height: 500px; overflow-y: auto; }
        .table th { position: sticky; top: 0; background-color: var(--ent-secondary); z-index: 10; }
        .table-sm td { padding: 0.25rem; }
        .table-sm .form-control-sm, .table-sm .form-select-sm { padding: 0.15rem 0.5rem; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="d-flex" id="wrapper">
        <div class="border-end bg-white" id="sidebar-wrapper">
            <div class="sidebar-heading text-center p-4">
                <img src="" alt="Logo" class="app-company-logo mb-2" style="max-height: 60px; max-width: 80%;">
                <h6 class="fw-bold app-company-name m-0 mt-2" style="color: #1c325e;">Company Name</h6>
            </div>
            <div class="list-group list-group-flush">
                <a href="index.html" class="list-group-item"><i class="fa-solid fa-house"></i> Dashboard</a>
                <a href="library.html" class="list-group-item"><i class="fa-solid fa-list"></i> Library</a>
                <a href="add.html" class="list-group-item active"><i class="fa-solid fa-plus"></i> Add Instrument</a>
                <a href="settings.html" class="list-group-item"><i class="fa-solid fa-gear"></i> Company Settings</a>
            </div>
        </div>

        <div id="page-content-wrapper" class="w-100 d-flex flex-column min-vh-100">
            <nav class="navbar px-3 py-2 d-flex justify-content-between align-items-center mb-3">
                <div class="d-flex align-items-center gap-2">
                    <button class="btn pill-nav-dark d-md-none" id="menu-toggle"><i class="fa-solid fa-bars"></i></button>
                    <div class="pill-nav-white d-none d-sm-flex">
                        <i class="fa-regular fa-clock text-success"></i> <span id="liveClock">Loading...</span>
                    </div>
                </div>
                <div class="text-white fw-bold d-none d-md-flex align-items-center gap-2">
                    <i class="fa-solid fa-folder-open"></i>
                    <span><span class="app-company-name">Company</span>_Instrument_Library</span>
                </div>
                <div class="d-flex align-items-center gap-2">
                    <div class="pill-nav-white text-success d-none d-sm-flex">
                        <i class="fa-solid fa-plug-circle-check"></i> System Online
                    </div>
                    <button class="btn pill-nav-dark" id="themeToggle"><i class="fa-solid fa-moon"></i></button>
                </div>
            </nav>

            <div class="container-fluid flex-grow-1 p-4 pt-2" id="main-content">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="page-title mb-0" id="pageTitle">Add Instrument</h2>
                    <button class="btn btn-success rounded-pill fw-bold px-4" id="btnSaveInst"><i class="fa-solid fa-save me-2"></i>Save Instrument</button>
                </div>

                <div class="card shadow-sm border-0">
                    <div class="card-header bg-white border-bottom-0 pt-3 px-4">
                        <ul class="nav nav-tabs card-header-tabs" role="tablist">
                            <li class="nav-item"><button class="nav-link active fw-semibold" data-bs-toggle="tab" data-bs-target="#generalTab" type="button">General</button></li>
                            <li class="nav-item"><button class="nav-link fw-semibold" data-bs-toggle="tab" data-bs-target="#commTab" type="button">Comm & TCP</button></li>
                            <li class="nav-item"><button class="nav-link fw-semibold" data-bs-toggle="tab" data-bs-target="#regTab" type="button">Registers</button></li>
                            <li class="nav-item"><button class="nav-link fw-semibold" data-bs-toggle="tab" data-bs-target="#mediaTab" type="button">Media & Docs</button></li>
                        </ul>
                    </div>
                    <div class="card-body p-4">
                        <div class="tab-content">
                            <!-- General -->
                            <div class="tab-pane fade show active" id="generalTab">
                                <datalist id="categoryList">
                                    <option value="CEMS">
                                    <option value="AAQMS">
                                    <option value="OCEMS">
                                    <option value="FLOW METER">
                                </datalist>
                                <datalist id="typeList">
                                    <option value="Sensor"><option value="Analyzer"><option value="Controller"><option value="Meter"><option value="Gateway">
                                </datalist>
                                <div class="row g-3 max-w-700">
                                    <div class="col-md-6"><label class="fw-bold">Instrument Name</label><input type="text" class="form-control" id="iName" required></div>
                                    <div class="col-md-6"><label class="fw-bold">Company / Plant</label><input type="text" class="form-control" id="iCompany"></div>
                                    <div class="col-md-6"><label class="fw-bold">Manufacturer</label><input type="text" class="form-control" id="iManuf"></div>
                                    <div class="col-md-6"><label class="fw-bold">Model</label><input type="text" class="form-control" id="iModel"></div>
                                    <div class="col-md-6"><label class="fw-bold">Category</label><input type="text" list="categoryList" class="form-control" id="iCat" placeholder="Select or type custom"></div>
                                    <div class="col-md-6"><label class="fw-bold">Instrument Type</label><input type="text" list="typeList" class="form-control" id="iType" placeholder="Select or type custom"></div>
                                    <div class="col-md-6"><label class="fw-bold">Firmware Version</label><input type="text" class="form-control" id="iFirmware"></div>
                                    <div class="col-12"><label class="fw-bold">Description / Notes</label><textarea class="form-control" id="iDesc" rows="3"></textarea></div>
                                </div>
                            </div>
                            
                            <!-- Comm & TCP -->
                            <div class="tab-pane fade" id="commTab">
                                <datalist id="protoList">
                                    <option value="Modbus RTU">Modbus RTU</option>
                                    <option value="Modbus TCP">Modbus TCP</option>
                                    <option value="Ethernet/IP">Ethernet/IP</option>
                                    <option value="PROFINET">PROFINET</option>
                                    <option value="PROFIBUS">PROFIBUS</option>
                                    <option value="CAN Bus">CAN Bus</option>
                                    <option value="CANopen">CANopen</option>
                                    <option value="DeviceNet">DeviceNet</option>
                                    <option value="EtherCAT">EtherCAT</option>
                                    <option value="HART">HART</option>
                                    <option value="OPC UA">OPC UA</option>
                                    <option value="MQTT">MQTT</option>
                                    <option value="RS232">RS232</option>
                                    <option value="RS485">RS485</option>
                                    <option value="USB">USB</option>
                                    <option value="Wi-Fi">Wi-Fi</option>
                                    <option value="Bluetooth">Bluetooth</option>
                                    <option value="GSM">GSM</option>
                                    <option value="4G">4G</option>
                                    <option value="5G">5G</option>
                                    <option value="LoRaWAN">LoRaWAN</option>
                                    <option value="NB-IoT">NB-IoT</option>
                                </datalist>
                                <datalist id="baudList">
                                    <option value="1200">1200</option>
                                    <option value="2400">2400</option>
                                    <option value="4800">4800</option>
                                    <option value="9600">9600</option>
                                    <option value="19200">19200</option>
                                    <option value="38400">38400</option>
                                    <option value="57600">57600</option>
                                    <option value="115200">115200</option>
                                </datalist>
                                <div class="row g-3 max-w-700">
                                    <h5 class="fw-bold border-bottom pb-2 mb-3">Communication</h5>
                                    <div class="col-md-6"><label class="fw-bold">Protocol</label><input type="text" list="protoList" class="form-control" id="cProto" placeholder="Select or type custom"></div>
                                    <div class="col-md-6">
                                        <label class="fw-bold">Comm Interface</label>
                                        <select class="form-select" id="cIface">
                                            <option value="RS485" selected>RS 485</option>
                                            <option value="RS232">RS 232</option>
                                            <option value="LAN">LAN</option>
                                            <option value="LAN TCPIP">LAN TCPIP</option>
                                        </select>
                                    </div>
                                    <div class="col-md-4"><label class="fw-bold">Slave ID</label><input type="number" class="form-control" id="cSlave"></div>
                                    <div class="col-md-4">
                                        <label class="fw-bold">Baud Rate</label>
                                        <select class="form-select" id="cBaud">
                                            <option value="2400">2400</option>
                                            <option value="4800">4800</option>
                                            <option value="9600" selected>9600</option>
                                            <option value="19200">19200</option>
                                            <option value="38400">38400</option>
                                            <option value="57600">57600</option>
                                            <option value="115200">115200</option>
                                        </select>
                                    </div>
                                    <div class="col-md-4">
                                        <label class="fw-bold">Parity</label>
                                        <select class="form-select" id="cParity">
                                            <option value="None" selected>None</option>
                                            <option value="Odd">Odd</option>
                                            <option value="Even">Even</option>
                                        </select>
                                    </div>
                                    <div class="col-md-4">
                                        <label class="fw-bold">Data Bits</label>
                                        <select class="form-select" id="cData">
                                            <option value="7">7</option>
                                            <option value="8" selected>8</option>
                                        </select>
                                    </div>
                                    <div class="col-md-4">
                                        <label class="fw-bold">Stop Bits</label>
                                        <select class="form-select" id="cStop">
                                            <option value="1" selected>1</option>
                                            <option value="2">2</option>
                                        </select>
                                    </div>
                                    <div class="col-md-4"><label class="fw-bold">Timeout (ms)</label><input type="number" class="form-control" id="cTime"></div>
                                    
                                    <h5 class="fw-bold border-bottom pb-2 mt-5 mb-3">TCP/IP Settings</h5>
                                    <div class="col-12 mb-2">
                                        <div class="form-check form-switch">
                                            <input class="form-check-input" type="checkbox" id="tcpEnabled">
                                            <label class="form-check-label fw-bold">Enable TCP/IP</label>
                                        </div>
                                    </div>
                                </div>
                                <div class="row g-3 max-w-700 mt-2" id="tcpFields" style="display:none;">
                                    <div class="col-md-6"><label class="fw-bold">IP Address</label><input type="text" class="form-control" id="tIp"></div>
                                    <div class="col-md-6"><label class="fw-bold">Subnet Mask</label><input type="text" class="form-control" id="tSub"></div>
                                    <div class="col-md-6"><label class="fw-bold">Gateway</label><input type="text" class="form-control" id="tGate"></div>
                                    <div class="col-md-6"><label class="fw-bold">DNS Server</label><input type="text" class="form-control" id="tDns"></div>
                                    <div class="col-md-6"><label class="fw-bold">MAC Address</label><input type="text" class="form-control" id="tMac"></div>
                                    <div class="col-md-6"><label class="fw-bold">Host Name</label><input type="text" class="form-control" id="tHost"></div>
                                    
                                    <div class="col-md-4"><label class="fw-bold">Device Port</label><input type="number" class="form-control" id="tDevPort"></div>
                                    <div class="col-md-4"><label class="fw-bold">TCP Port</label><input type="number" class="form-control" id="tTcpPort"></div>
                                    <div class="col-md-4"><label class="fw-bold">UDP Port</label><input type="number" class="form-control" id="tUdpPort"></div>
                                    <div class="col-md-4"><label class="fw-bold">Modbus TCP Port</label><input type="number" class="form-control" id="tModPort" placeholder="502"></div>
                                    <div class="col-md-4"><label class="fw-bold">HTTP Port</label><input type="number" class="form-control" id="tHttpPort" placeholder="80"></div>
                                    <div class="col-md-4"><label class="fw-bold">HTTPS Port</label><input type="number" class="form-control" id="tHttpsPort" placeholder="443"></div>
                                    <div class="col-md-4"><label class="fw-bold">FTP Port</label><input type="number" class="form-control" id="tFtpPort"></div>
                                    <div class="col-md-4"><label class="fw-bold">MQTT Port</label><input type="number" class="form-control" id="tMqttPort" placeholder="1883"></div>
                                    <div class="col-md-4"><label class="fw-bold">OPC UA Endpoint</label><input type="text" class="form-control" id="tOpc"></div>
                                    
                                    <div class="col-md-6"><label class="fw-bold">Connection Timeout (ms)</label><input type="number" class="form-control" id="tConnTime"></div>
                                    <div class="col-md-6"><label class="fw-bold">Retry Count</label><input type="number" class="form-control" id="tRetry"></div>
                                    <div class="col-md-6"><label class="fw-bold">Polling Interval (ms)</label><input type="number" class="form-control" id="tPoll"></div>
                                    <div class="col-md-6"><label class="fw-bold">Keep Alive (ms)</label><input type="number" class="form-control" id="tKeep"></div>
                                    <div class="col-md-6"><label class="fw-bold">Socket Timeout (ms)</label><input type="number" class="form-control" id="tSockTime"></div>
                                </div>
                            </div>

                            <!-- Registers -->
                            <div class="tab-pane fade" id="regTab">
                                <datalist id="unitList">
                                    <option value="%">%</option>
                                    <option value="°C">°C-degree Celsius</option>
                                    <option value="°F">°F-degree Fahrenheit</option>
                                    <option value="cm">cm-centimeter</option>
                                    <option value="cm/s">cm/s</option>
                                    <option value="cm³">cm³-cubic centimeter</option>
                                    <option value="g/m³">g/m³</option>
                                    <option value="kg/m³">kg/m³</option>
                                    <option value="mg/L">mg/L-milligram per liter (effluent)</option>
                                    <option value="mg/m³">mg/m³</option>
                                    <option value="mg/Nm³">mg/Nm³-milligram per normal m³ (stack)</option>
                                    <option value="μg/m³">μg/m³</option>
                                    <option value="µg/Nm³">µg/Nm³-microgram per normal m³</option>
                                    <option value="ppm">ppm-parts per million</option>
                                    <option value="ppb">ppb-parts per billion</option>
                                    <option value="pH">pH</option>
                                    <option value="m³/hr">m³/hr-cubic meter per hour</option>
                                    <option value="m³/day">m³/day</option>
                                    <option value="Nm³/hr">Nm³/hr-normal cubic meter per hour</option>
                                    <option value="l/s">l/s</option>
                                    <option value="l/min">l/min</option>
                                    <option value="NTU">NTU-turbidity</option>
                                    <option value="uS/cm">uS/cm-conductivity</option>
                                    <option value="mS/cm">mS/cm</option>
                                    <option value="kg/hr">kg/hr</option>
                                    <option value="ton/hr">ton/hr</option>
                                    <option value="bar">bar</option>
                                    <option value="Pa">Pa</option>
                                    <option value="mbar">mbar</option>
                                </datalist>
                                <div class="d-flex justify-content-between mb-3">
                                    <h5 class="fw-bold mb-0">Modbus Register Library</h5>
                                    <button class="btn btn-sm btn-primary" id="btnAddRow"><i class="fa-solid fa-plus me-1"></i> Add Row</button>
                                </div>
                                <div class="table-responsive border rounded">
                                    <table class="table table-sm table-bordered table-hover mb-0">
                                        <thead>
                                            <tr>
                                                <th style="width: 20%; min-width: 150px;">Reg Name</th>
                                                <th style="width: 10%; min-width: 90px;">Reg Address</th>
                                                <th style="width: 8%; min-width: 60px;">Length</th>
                                                <th style="width: 12%; min-width: 100px;">Reg Type</th>
                                                <th style="width: 15%; min-width: 120px;">Data Type</th>
                                                <th style="width: 10%; min-width: 80px;">Eng Unit</th>
                                                <th style="width: 8%; min-width: 70px;">R/W</th>
                                                <th style="width: 12%; min-width: 100px;">Notes</th>
                                                <th style="width: 5%; min-width: 50px;">Action</th>
                                            </tr>
                                        </thead>
                                        <tbody id="registerTableBody"></tbody>
                                    </table>
                                </div>
                            </div>

                            <!-- Media -->
                            <div class="tab-pane fade" id="mediaTab">
                                <div class="row g-4 max-w-700" id="mediaContainer">
                                    <script>
                                        const mediaCategories = ['images', 'manuals', 'datasheets', 'wiring', 'certificates', 'calibration', 'firmware'];
                                        const mediaContainer = document.getElementById('mediaContainer');
                                        mediaCategories.forEach(cat => {
                                            mediaContainer.innerHTML += `
                                                <div class="col-12 border-bottom pb-3">
                                                    <h6 class="fw-bold text-primary text-capitalize"><i class="fa-solid fa-file-lines me-2"></i>${cat}</h6>
                                                    <div class="text-muted small mb-2">Save the instrument first before uploading files. (If editing, you can upload directly here).</div>
                                                    <div class="row g-2">
                                                        <div class="col-md-6">
                                                            <label class="fw-semibold small">Upload File:</label>
                                                            <input type="file" class="form-control form-control-sm media-file" id="mFile_${cat}" disabled>
                                                        </div>
                                                        <div class="col-md-6">
                                                            <label class="fw-semibold small">Or add a Web Link:</label>
                                                            <input type="url" class="form-control form-control-sm media-url" id="mUrl_${cat}" placeholder="https://...">
                                                        </div>
                                                    </div>
                                                </div>
                                            `;
                                        });
                                    </script>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1060;">
        <div id="appToast" class="toast" role="alert">
            <div class="d-flex"><div class="toast-body fw-medium" id="toastMessage"></div><button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/app.js"></script>
    <script type="module" src="js/instrument.js"></script>
</body>
</html>
