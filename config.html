<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIT Document Portal - Admin & Config</title>
  
  <!-- Favicon Fix (Emoji Favicon - prevents 404 error) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚙️</text></svg>">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    :root {
      --primary: #0f172a;
      --primary-hover: #1e293b;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --accent-light: #eff6ff;
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --border: #e2e8f0;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --danger: #ef4444;
      --danger-bg: #fef2f2;
      --warning: #d97706;
      --warning-bg: #fffbeb;
      --success: #10b981;
      --success-bg: #ecfdf5;
      --radius: 10px;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -2px rgba(0,0,0,0.05);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text-main);
      padding: 40px 20px;
      line-height: 1.5;
    }

    .container { 
      max-width: 1050px; 
      margin: 0 auto; 
    }

    .header-banner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    h1 { 
      font-size: 1.5rem; 
      font-weight: 700; 
      color: var(--primary);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: var(--shadow-md);
      transition: border-color 0.2s;
    }

    .card h2 {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--primary);
      margin-bottom: 18px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 18px;
    }

    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }

    label { 
      font-size: 0.8rem; 
      font-weight: 600; 
      color: var(--text-muted); 
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input[type="text"], select {
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.9rem;
      font-family: inherit;
      color: var(--text-main);
      background-color: #fff;
      outline: none;
      transition: all 0.2s ease;
    }

    input[type="text"]:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    select[multiple] {
      padding: 8px;
      border-radius: 8px;
    }

    select[multiple] option {
      padding: 6px 10px;
      border-radius: 4px;
      margin-bottom: 2px;
      font-size: 0.85rem;
    }

    .btn-submit {
      margin-top: 20px;
      padding: 11px 22px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
      box-shadow: 0 2px 4px rgba(37, 99, 235, 0.2);
    }

    .btn-submit:hover { 
      background: var(--accent-hover); 
      transform: translateY(-1px);
    }

    /* Table Design */
    .table-responsive {
      overflow-x: auto;
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    table { 
      width: 100%; 
      border-collapse: collapse; 
      background: white;
      text-align: left;
    }

    th, td { 
      padding: 14px 16px; 
      border-bottom: 1px solid var(--border); 
      font-size: 0.88rem; 
      vertical-align: middle; 
    }

    th { 
      background: #f8fafc; 
      font-weight: 600; 
      color: var(--text-muted); 
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background-color: #f8fafc; }

    .doc-path {
      font-size: 0.78rem;
      color: var(--text-muted);
      font-family: monospace;
      background: #f1f5f9;
      padding: 2px 6px;
      border-radius: 4px;
      display: inline-block;
      margin-top: 4px;
      word-break: break-all;
    }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      background: var(--accent-light);
      color: var(--accent);
      font-size: 0.75rem;
      font-weight: 600;
      margin: 2px 4px 2px 0;
      border: 1px solid #dbeafe;
    }

    .action-group {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .btn-act {
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.78rem;
      font-weight: 600;
      border: 1px solid transparent;
      transition: all 0.2s;
    }

    .btn-edit { background: var(--warning-bg); color: var(--warning); border-color: #fde68a; }
    .btn-edit:hover { background: var(--warning); color: white; }

    .btn-copy { background: var(--success-bg); color: var(--success); border-color: #a7f3d0; }
    .btn-copy:hover { background: var(--success); color: white; }

    .btn-delete { background: var(--danger-bg); color: var(--danger); border-color: #fca5a5; }
    .btn-delete:hover { background: var(--danger); color: white; }

    .status-msg { 
      margin-top: 14px; 
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 0.85rem; 
      font-weight: 600; 
      display: none;
    }

    /* Modal Styling */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(4px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 999;
    }

    .modal-content {
      background: white;
      padding: 28px;
      border-radius: var(--radius);
      width: 90%;
      max-width: 520px;
      box-shadow: 0 20px 25px -5px rgba(0,0,0,0.15);
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 20px;
    }

    .btn-cancel {
      padding: 9px 18px;
      background: #f1f5f9;
      color: var(--text-main);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-cancel:hover { background: #e2e8f0; }
  </style>
</head>
<body>

  <div class="container">
    <div class="header-banner">
      <h1>⚙️ Document Portal Config</h1>
    </div>

    <!-- Entry Form Card -->
    <div class="card">
      <h2>Add New Document</h2>
      <form id="docForm">
        <div class="form-grid">
          <div class="form-group full">
            <label for="docTitle">Document Title</label>
            <input type="text" id="docTitle" placeholder="e.g. AAD-CEMS-200 User Manual" required>
          </div>

          <div class="form-group full">
            <label for="docFile">File Path or URL</label>
            <input type="text" id="docFile" placeholder="e.g. aituser/AAD-CEMS-200 User Manual.pdf" required>
          </div>

          <div class="form-group">
            <label for="docCategories">Categories (Hold Ctrl/Cmd to select multiple)</label>
            <select id="docCategories" multiple size="5" required>
              <option value="SERVES REPORTS">SERVES REPORTS</option>
              <option value="Manual">Manual</option>
              <option value="LDM">LDM</option>
              <option value="CAAQMS">CAAQMS</option>
              <option value="OCEMS">OCEMS</option>
              <option value="Flow Meters">Flow Meters</option>
              <option value="Spare list all">Spare list all</option>
              <option value="Installation Requirements">Installation Requirements</option>
            </select>
          </div>

          <div class="form-group">
            <label for="docSize">Format / Size Label</label>
            <select id="docSize">
              <option value="PDF">PDF</option>
              <option value="WORD">WORD</option>
              <option value="EXCEL">EXCEL</option>
            </select>

            <div style="margin-top: 12px;">
              <label for="docIcon">Icon (Emoji)</label>
              <input type="text" id="docIcon" value="📗" placeholder="📗" style="width: 100%;">
            </div>
          </div>
        </div>

        <button type="submit" class="btn-submit">Save Document to Database</button>
        <div id="statusMsg" class="status-msg"></div>
      </form>
    </div>

    <!-- Data Table Card -->
    <div class="card">
      <h2>
        <span>Live Documents</span>
        <span id="recordCount" style="font-size: 0.8rem; font-weight: 500; color: var(--text-muted);">0 Records</span>
      </h2>
      <div class="table-responsive">
        <table>
          <thead>
            <tr>
              <th style="width: 50px;">Icon</th>
              <th>Document details</th>
              <th>Categories</th>
              <th style="width: 80px;">Format</th>
              <th style="width: 180px;">Actions</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr><td colspan="5" style="text-align:center; color: var(--text-muted);">Loading database items...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Edit Document Modal -->
  <div class="modal-overlay" id="editModal">
    <div class="modal-content">
      <h2 style="font-size: 1.1rem; margin-bottom: 16px;">Edit Document</h2>
      <form id="editForm">
        <input type="hidden" id="editKey">
        <div class="form-group" style="margin-bottom: 14px;">
          <label for="editTitle">Document Title</label>
          <input type="text" id="editTitle" required>
        </div>
        <div class="form-group" style="margin-bottom: 14px;">
          <label for="editFile">File Path / URL</label>
          <input type="text" id="editFile" required>
        </div>
        <div class="form-group" style="margin-bottom: 14px;">
          <label for="editIcon">Icon Emoji</label>
          <input type="text" id="editIcon" required>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-cancel" onclick="closeEditModal()">Cancel</button>
          <button type="submit" class="btn-submit" style="margin: 0;">Save Changes</button>
        </div>
      </form>
    </div>
  </div>

  <!-- MODULE IMPORT FROM FIREBASE.JS -->
  <script type="module">
    import { addDocument, updateDocument, deleteDocument, listenToDocuments } from './firebase.js';

    let currentData = {};

    // Form Submit: Add New Document
    document.getElementById('docForm').addEventListener('submit', (e) => {
      e.preventDefault();
      
      const title = document.getElementById('docTitle').value;
      const file = document.getElementById('docFile').value;
      const categorySelect = document.getElementById('docCategories');
      const selectedCategories = Array.from(categorySelect.selectedOptions).map(opt => opt.value);
      const size = document.getElementById('docSize').value;
      const icon = document.getElementById('docIcon').value;

      addDocument({ title, file, category: selectedCategories, size, icon })
        .then(() => {
          showStatus('✅ Document saved successfully!', '#10b981', '#ecfdf5');
          document.getElementById('docForm').reset();
        })
        .catch((error) => {
          showStatus('❌ Error: ' + error.message, '#ef4444', '#fef2f2');
        });
    });

    // Realtime Database Listener & Safe Table Rendering
    listenToDocuments((data) => {
      currentData = data || {};
      const tbody = document.getElementById('tableBody');
      const recordCount = document.getElementById('recordCount');
      tbody.innerHTML = '';

      if (!data) {
        recordCount.textContent = '0 Records';
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; color: var(--text-muted);">No documents found in database.</td></tr>';
        return;
      }

      const keys = Object.keys(data);
      recordCount.textContent = `${keys.length} Record${keys.length === 1 ? '' : 's'}`;

      keys.forEach((key) => {
        const item = data[key];
        
        const title = item.title || 'Untitled Document';
        const file = item.file || item.path || 'No path specified';
        const icon = item.icon || '📄';
        const size = item.size || 'PDF';

        let catBadges = '';
        if (item.category) {
          const cats = Array.isArray(item.category) ? item.category : [item.category];
          catBadges = cats.map(c => `<span class="badge">${c}</span>`).join('');
        } else {
          catBadges = '<span style="color:var(--text-muted); font-size:0.8rem;">None</span>';
        }

        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td style="font-size:1.3rem; text-align:center;">${icon}</td>
          <td>
            <strong style="color:var(--text-main); font-size:0.92rem;">${title}</strong><br>
            <span class="doc-path">${file}</span>
          </td>
          <td>${catBadges}</td>
          <td><span style="font-weight:600; font-size:0.8rem; color:var(--text-muted);">${size}</span></td>
          <td>
            <div class="action-group">
              <button class="btn-act btn-edit" onclick="handleEdit('${key}')">Edit</button>
              <button class="btn-act btn-copy" onclick="handleCopy('${key}')">Copy</button>
              <button class="btn-act btn-delete" onclick="handleDelete('${key}')">Delete</button>
            </div>
          </td>
        `;
        tbody.appendChild(tr);
      });
    });

    // --- Action Handlers ---

    // Fixed & Reliable Copy Function (Clipboard API + Fallback)
    window.handleCopy = function(key) {
      const item = currentData[key];
      if (!item) {
        showStatus('❌ Error: Item not found', '#ef4444', '#fef2f2');
        return;
      }

      const textToCopy = item.file || item.path || item.title || '';

      if (!textToCopy) {
        showStatus('⚠️ No path available to copy', '#d97706', '#fffbeb');
        return;
      }

      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(textToCopy)
          .then(() => {
            showStatus('📋 Path copied to clipboard!', '#2563eb', '#eff6ff');
          })
          .catch((err) => {
            console.warn('Clipboard API failed, using fallback:', err);
            fallbackCopyText(textToCopy);
          });
      } else {
        fallbackCopyText(textToCopy);
      }
    };

    function fallbackCopyText(text) {
      try {
        const textArea = document.createElement('textarea');
        textArea.value = text;
        textArea.style.position = 'fixed';
        textArea.style.left = '-9999px';
        document.body.appendChild(textArea);
        textArea.focus();
        textArea.select();
        
        const successful = document.execCommand('copy');
        document.body.removeChild(textArea);

        if (successful) {
          showStatus('📋 Path copied to clipboard!', '#2563eb', '#eff6ff');
        } else {
          showStatus('❌ Failed to copy path', '#ef4444', '#fef2f2');
        }
      } catch (err) {
        console.error('Fallback copy failed:', err);
        showStatus('❌ Copy error: ' + err.message, '#ef4444', '#fef2f2');
      }
    }

    // Modal Edit Functions
    window.handleEdit = function(key) {
      const item = currentData[key];
      if (!item) return;

      document.getElementById('editKey').value = key;
      document.getElementById('editTitle').value = item.title || '';
      document.getElementById('editFile').value = item.file || item.path || '';
      document.getElementById('editIcon').value = item.icon || '📗';

      document.getElementById('editModal').style.display = 'flex';
    };

    window.closeEditModal = function() {
      document.getElementById('editModal').style.display = 'none';
    };

    // Form Submit: Update Document
    document.getElementById('editForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const key = document.getElementById('editKey').value;
      const updatedTitle = document.getElementById('editTitle').value;
      const updatedFile = document.getElementById('editFile').value;
      const updatedIcon = document.getElementById('editIcon').value;

      updateDocument(key, {
        title: updatedTitle,
        file: updatedFile,
        icon: updatedIcon
      }).then(() => {
        closeEditModal();
        showStatus('✏️ Document updated successfully!', '#10b981', '#ecfdf5');
      }).catch((err) => {
        showStatus('❌ Update failed: ' + err.message, '#ef4444', '#fef2f2');
      });
    });

    // Delete Function
    window.handleDelete = function(key) {
      if (confirm('Are you sure you want to delete this document?')) {
        deleteDocument(key)
          .then(() => showStatus('🗑️ Document deleted.', '#ef4444', '#fef2f2'))
          .catch((err) => showStatus('❌ Delete failed: ' + err.message, '#ef4444', '#fef2f2'));
      }
    };

    // Utility: Toast Status Banner
    function showStatus(text, textColor, bgColor) {
      const msg = document.getElementById('statusMsg');
      msg.textContent = text;
      msg.style.color = textColor;
      msg.style.backgroundColor = bgColor;
      msg.style.display = 'block';
      setTimeout(() => { msg.style.display = 'none'; }, 3000);
    }
  </script>
</body>
</html>
