<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Engineering Document Portal">
    <title>Enterprise Manual Portal</title>
    
    <style>
        :root {
            --primary: #0f172a;
            --accent: #3b82f6;
            --sidebar-bg: #f8fafc;
            --content-bg: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --header-height: 64px;
        }

        [data-theme="dark"] {
            --primary: #f8fafc;
            --sidebar-bg: #0f172a;
            --content-bg: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border: #334155;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--content-bg);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: grid;
            grid-template-columns: 320px 1fr;
        }

        /* Mobile Header */
        .mobile-header {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--header-height);
            background: var(--sidebar-bg);
            border-bottom: 1px solid var(--border);
            z-index: 1000;
            padding: 0 20px;
            align-items: center;
            justify-content: space-between;
        }

        .menu-toggle {
            background: none;
            border: none;
            font-size: 24px;
            color: var(--text-primary);
            cursor: pointer;
            padding: 8px;
        }

        /* Sidebar */
        .sidebar {
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            font-size: 1.25rem;
            color: var(--accent);
        }

        .logo svg {
            width: 32px;
            height: 32px;
        }

        .subtitle {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .search-container {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
        }

        .search-box {
            position: relative;
            width: 100%;
        }

        .search-box input {
            width: 100%;
            padding: 10px 16px 10px 40px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--content-bg);
            color: var(--text-primary);
            font-size: 0.875rem;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .search-box svg {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            width: 18px;
            height: 18px;
        }

        .filter-tags {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            overflow-x: auto;
            padding-bottom: 4px;
        }

        .tag {
            padding: 4px 12px;
            background: var(--content-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 0.75rem;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .tag:hover, .tag.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        /* Pull to refresh indicator */
        .pull-indicator {
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-size: 0.875rem;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .pull-indicator.visible {
            opacity: 1;
        }

        .pull-indicator.loading svg {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .doc-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .category {
            margin-bottom: 16px;
        }

        .category-title {
            padding: 8px 16px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        .doc-item {
            padding: 12px 16px;
            margin: 4px 8px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .doc-item:hover {
            background: var(--content-bg);
            border-color: var(--border);
            transform: translateX(4px);
        }

        .doc-item.active {
            background: var(--accent);
            color: white;
            box-shadow: var(--shadow);
        }

        .doc-item.active .doc-meta {
            color: rgba(255, 255, 255, 0.8);
        }

        .doc-icon {
            width: 40px;
            height: 40px;
            background: rgba(59, 130, 246, 0.1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .doc-item.active .doc-icon {
            background: rgba(255, 255, 255, 0.2);
        }

        .doc-info {
            flex: 1;
            min-width: 0;
        }

        .doc-title {
            font-weight: 500;
            font-size: 0.875rem;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .doc-meta {
            font-size: 0.75rem;
            color: var(--text-secondary);
            display: flex;
            gap: 8px;
        }

        /* Viewer */
        .viewer {
            display: flex;
            flex-direction: column;
            background: #52525b;
            position: relative;
        }

        .viewer-toolbar {
            height: var(--header-height);
            background: var(--content-bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            box-shadow: var(--shadow);
            z-index: 10;
        }

        .toolbar-left {
            display: flex;
            align-items: center;
            gap: 16px;
            flex: 1;
            min-width: 0;
        }

        .doc-title-main {
            font-weight: 600;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .toolbar-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn {
            padding: 8px 16px;
            border: 1px solid var(--border);
            background: var(--content-bg);
            color: var(--text-primary);
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.875rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
            font-weight: 500;
        }

        .btn:hover {
            background: var(--sidebar-bg);
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .btn-primary:hover {
            background: var(--accent);
            opacity: 0.9;
        }

        .btn-icon {
            padding: 8px;
        }

        .zoom-controls {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 4px;
            background: var(--sidebar-bg);
            border-radius: 6px;
            margin-right: 12px;
        }

        .zoom-level {
            min-width: 60px;
            text-align: center;
            font-size: 0.875rem;
            font-weight: 500;
        }

        .frame-container {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: #52525b;
        }

        #doc-frame {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }

        .loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 20;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .loading-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }

        .progress-bar {
            width: 200px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            margin-top: 12px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.3s;
        }

        .error-state {
            position: absolute;
            inset: 0;
            background: var(--content-bg);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
        }

        .error-state.active {
            display: flex;
        }

        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .toast {
            background: var(--primary);
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            display: flex;
            align-items: center;
            gap: 8px;
            animation: slideIn 0.3s ease;
            font-size: 0.875rem;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .toast.error { background: #ef4444; }
        .toast.success { background: #10b981; }

        /* Responsive */
        @media (max-width: 768px) {
            body {
                grid-template-columns: 1fr;
            }
            
            .mobile-header {
                display: flex;
            }
            
            .sidebar {
                position: fixed;
                left: 0;
                top: var(--header-height);
                bottom: 0;
                width: 100%;
                z-index: 100;
                transform: translateX(-100%);
                box-shadow: 2px 0 8px rgba(0,0,0,0.1);
            }
            
            .sidebar.open {
                transform: translateX(0);
            }
            
            .viewer {
                margin-top: var(--header-height);
                height: calc(100vh - var(--header-height));
            }
            
            .zoom-controls {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- Mobile Header -->
    <div class="mobile-header">
        <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
        <div class="logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="16" y1="13" x2="8" y2="13"></line>
                <line x1="16" y1="17" x2="8" y2="17"></line>
            </svg>
            <span>Engineering Portal</span>
        </div>
    </div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                </svg>
                <span>Engineering Portal</span>
            </div>
            <div class="subtitle">Document Management System</div>
        </div>

        <div class="search-container">
            <div class="search-box">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.35-4.35"></path>
                </svg>
                <input type="text" id="searchInput" placeholder="Search manuals..." onkeyup="filterDocs()">
            </div>
            <div class="filter-tags">
                <span class="tag active" onclick="filterCategory('all', this)">All</span>
                <span class="tag" onclick="filterCategory('plc', this)">PLC</span>
                <span class="tag" onclick="filterCategory('sensors', this)">Sensors</span>
                <span class="tag" onclick="filterCategory('network', this)">Network</span>
            </div>
        </div>

        <div class="pull-indicator" id="pullIndicator">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 8px;">
                <polyline points="23 4 23 10 17 10"></polyline>
                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
            </svg>
            <span>Pull to refresh</span>
        </div>

        <div class="doc-list" id="docList"></div>
    </aside>

    <!-- Main Viewer -->
    <main class="viewer">
        <div class="viewer-toolbar">
            <div class="toolbar-left">
                <div class="doc-title-main" id="currentTitle">Select a document to view</div>
            </div>
            
            <div class="toolbar-right">
                <div class="zoom-controls">
                    <button class="btn btn-icon" onclick="zoom(-0.1)">−</button>
                    <span class="zoom-level" id="zoomLevel">100%</span>
                    <button class="btn btn-icon" onclick="zoom(0.1)">+</button>
                </div>
                
                <button class="btn" onclick="toggleFullscreen()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 4px;">
                        <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>
                    </svg>
                    Fullscreen
                </button>
            </div>
        </div>

        <div class="frame-container" id="frameContainer">
            <div class="loading-overlay" id="loadingOverlay">
                <div class="spinner"></div>
                <div>Loading document...</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>

            <div class="error-state" id="errorState">
                <div style="font-size: 48px; margin-bottom: 16px;">⚠️</div>
                <h3>Failed to Load Document</h3>
                <p>The document could not be loaded. Please check your connection.</p>
                <button class="btn btn-primary" onclick="retryLoad()" style="margin-top: 16px;">Retry</button>
            </div>

            <iframe id="doc-frame" src=""></iframe>
        </div>
    </main>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        const documents = [
            { id: 1, title: "PLC Setup Guide V2.1", file: "PLC_Setup_V1.pdf", category: "plc", size: "2.4 MB", type: "Setup" },
            { id: 2, title: "Sensor Calibration Protocol", file: "Sensor_Calibration.pdf", category: "sensors", size: "1.8 MB", type: "Calibration" },
            { id: 3, title: "Modbus TCP Wiring Map", file: "Modbus_Wiring.pdf", category: "network", size: "3.2 MB", type: "Diagram" },
            { id: 4, title: "Troubleshooting FAQ", file: "Troubleshooting.pdf", category: "plc", size: "856 KB", type: "Reference" },
            { id: 5, title: "Safety Interlock Manual", file: "Safety_Interlock.pdf", category: "plc", size: "4.1 MB", type: "Safety" }
        ];

        let currentDoc = null;
        let zoomScale = 1;
        let currentFilter = 'all';
        let touchStartY = 0;

        document.addEventListener('DOMContentLoaded', () => {
            renderDocList();
            setupPullToRefresh();
        });

        function renderDocList() {
            const list = document.getElementById('docList');
            const filtered = currentFilter === 'all' 
                ? documents 
                : documents.filter(d => d.category === currentFilter);
            
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const searched = filtered.filter(d => 
                d.title.toLowerCase().includes(searchTerm) || 
                d.type.toLowerCase().includes(searchTerm)
            );

            const grouped = searched.reduce((acc, doc) => {
                if (!acc[doc.category]) acc[doc.category] = [];
                acc[doc.category].push(doc);
                return acc;
            }, {});

            let html = '';
            for (const [category, docs] of Object.entries(grouped)) {
                html += `
                    <div class="category">
                        <div class="category-title">${category.charAt(0).toUpperCase() + category.slice(1)} (${docs.length})</div>
                        ${docs.map(doc => `
                            <div class="doc-item" onclick="loadDocument(${doc.id}, this)" data-id="${doc.id}">
                                <div class="doc-icon">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                        <polyline points="14 2 14 8 20 8"></polyline>
                                    </svg>
                                </div>
                                <div class="doc-info">
                                    <div class="doc-title">${doc.title}</div>
                                    <div class="doc-meta">${doc.type} • ${doc.size}</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }
            
            list.innerHTML = html || '<div style="padding: 24px; text-align: center; color: var(--text-secondary);">No documents found</div>';
        }

        async function loadDocument(id, element) {
            const doc = documents.find(d => d.id === id);
            if (!doc) return;
            
            currentDoc = id;
            
            document.querySelectorAll('.doc-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            document.getElementById('currentTitle').textContent = doc.title;
            
            const overlay = document.getElementById('loadingOverlay');
            const progressFill = document.getElementById('progressFill');
            const errorState = document.getElementById('errorState');
            const frame = document.getElementById('doc-frame');
            
            overlay.classList.add('active');
            errorState.classList.remove('active');
            
            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.random() * 30;
                if (progress > 90) progress = 90;
                progressFill.style.width = progress + '%';
            }, 200);

            try {
                await new Promise(r => setTimeout(r, 1500));
                
                // Use Google Docs viewer or local path
                const folderPath = "manuals/";
                frame.src = folderPath + doc.file + "#toolbar=0&navpanes=0";
                
                frame.onload = () => {
                    clearInterval(interval);
                    progressFill.style.width = '100%';
                    setTimeout(() => overlay.classList.remove('active'), 300);
                };
                
                frame.onerror = () => { throw new Error('Load failed'); };
                
            } catch (err) {
                clearInterval(interval);
                overlay.classList.remove('active');
                errorState.classList.add('active');
                showToast('Error loading document', 'error');
            }
            
            if (window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.remove('open');
            }
        }

        function zoom(delta) {
            zoomScale = Math.max(0.5, Math.min(2.0, zoomScale + delta));
            document.getElementById('zoomLevel').textContent = Math.round(zoomScale * 100) + '%';
            
            const frame = document.getElementById('doc-frame');
            if (currentDoc && frame.src) {
                const doc = documents.find(d => d.id === currentDoc);
                frame.src = `manuals/${doc.file}#toolbar=0&navpanes=0&zoom=${Math.round(zoomScale * 100)}`;
            }
        }

        function filterDocs() { renderDocList(); }

        function filterCategory(cat, el) {
            currentFilter = cat;
            document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            renderDocList();
        }

        function setupPullToRefresh() {
            const sidebar = document.getElementById('sidebar');
            const indicator = document.getElementById('pullIndicator');
            
            sidebar.addEventListener('touchstart', (e) => {
                if (sidebar.scrollTop === 0) touchStartY = e.touches[0].clientY;
            }, { passive: true });
            
            sidebar.addEventListener('touchmove', (e) => {
                if (sidebar.scrollTop === 0) {
                    const diff = e.touches[0].clientY - touchStartY;
                    if (diff > 0 && diff < 100) {
                        indicator.classList.add('visible');
                    }
                }
            }, { passive: true });
            
            sidebar.addEventListener('touchend', (e) => {
                const diff = e.changedTouches[0].clientY - touchStartY;
                if (diff > 80) {
                    indicator.classList.add('loading');
                    setTimeout(() => {
                        indicator.classList.remove('visible', 'loading');
                        renderDocList();
                        showToast('Library refreshed', 'success');
                    }, 1000);
                } else {
                    indicator.classList.remove('visible');
                }
            });
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        function retryLoad() {
            if (currentDoc) {
                const el = document.querySelector(`[data-id="${currentDoc}"]`);
                loadDocument(currentDoc, el);
            }
        }

        function showToast(msg, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icon = type === 'success' ? '✓' : type === 'error' ? '✕' : 'ℹ';
            toast.innerHTML = `<span>${icon}</span> ${msg}`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
    </script>
</body>
</html>
