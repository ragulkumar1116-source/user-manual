<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="shortcut icon" href="https://www.aadhavintech.com/img/logos/logo.png">
<meta charset="UTF-8">
<meta name="viewport" content="https://trtdlaita199.tratasoft.com/branding-assets/logo.png?v=1776069539">
<title>Secure Access</title>

<!-- Cloudflare Turnstile -->
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

<style>
body {
    margin:0;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:sans-serif;
    background:#0f172a;
    color:white;
}
.box {
    background:#1e293b;
    padding:40px;
    border-radius:12px;
    text-align:center;
    width:90%;
    max-width:400px;
}
</style>
</head>

<body>

<div class="box">
    <h2>🔐 Human Verification</h2>
    <p>Please verify to continue</p>

    <div id="cf-turnstile"></div>
</div>

<script>
// If already verified → go directly
if (sessionStorage.getItem("verified") === "true") {
    window.location.href = "dashboard.html";
}

function handleSuccess(token) {
    // Save verification
    sessionStorage.setItem("verified", "true");

    // Redirect
    window.location.href = "dashboard.html";
}

window.onload = function () {
    turnstile.render("#cf-turnstile", {
        sitekey: "0x4AAAAAAC_oIfs4NGupxZya",
        callback: handleSuccess
    });
};
</script>
  

</body>
</html>
