<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="shortcut icon" href="manuals/logo (2).ico">

<title>AIT Document Portal</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&display=swap');

:root {
    --primary: #4a6616;
    --accent: #a3e635;
    --bg: #030712;
    --error: #ff6b6b;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Quicksand', sans-serif;
}

body {
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
}

/* BACKGROUND */
.gradient-bg {
    position: fixed;
    width: 100%;
    height: 100%;
    filter: blur(80px);
    z-index: 1;
}

.blob {
    position: absolute;
    width: 50vw;
    height: 50vw;
    border-radius: 50%;
    background: var(--primary);
    opacity: 0.4;
    animation: move 20s infinite alternate;
}

.blob-2 {
    background: #1e3a0a;
    right: 10%;
    top: 10%;
}

@keyframes move {
    from { transform: translate(-10%, -10%) scale(1); }
    to { transform: translate(20%, 20%) scale(1.2); }
}

/* CARD */
.signin {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 420px;
    padding: 50px 35px;
    background: rgba(255,255,255,0.03);
    backdrop-filter: blur(25px);
    border-radius: 32px;
    border: 1px solid rgba(255,255,255,0.1);
    text-align: center;
    box-shadow: 0 40px 100px rgba(0,0,0,0.6);
}

.company-logo {
    width: 80px;
    margin-bottom: 20px;
}

h2 {
    color: white;
    font-weight: 300;
    letter-spacing: 4px;
    margin-bottom: 25px;
}

.form {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.inputBox input {
    width: 100%;
    padding: 14px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(0,0,0,0.4);
    color: white;
}

.btn-login {
    padding: 14px;
    border: none;
    border-radius: 14px;
    background: linear-gradient(135deg,#fff,#d9f99d);
    font-weight: bold;
    cursor: pointer;
}

.status {
    margin-top: 15px;
    color: white;
    font-size: 0.9rem;
}

/* =========================
   MOBILE RESPONSIVE FIX
   ========================= */

@media (max-width: 768px) {

    body {
        padding: 15px;
    }

    .signin {
        max-width: 100%;
        padding: 35px 20px;
        border-radius: 24px;
    }

    .company-logo {
        width: 65px;
        margin-bottom: 15px;
    }

    h2 {
        font-size: 1.2rem;
        letter-spacing: 2px;
        margin-bottom: 20px;
    }

    .form {
        gap: 12px;
    }

    .inputBox input {
        padding: 12px;
        font-size: 0.95rem;
    }

    .btn-login {
        padding: 12px;
        font-size: 0.95rem;
    }

    .status {
        font-size: 0.85rem;
    }
}

@media (max-width: 480px) {

    .signin {
        padding: 30px 15px;
        border-radius: 20px;
    }

    .company-logo {
        width: 55px;
    }

    h2 {
        font-size: 1rem;
        letter-spacing: 1.5px;
    }

    .inputBox input {
        padding: 11px;
        border-radius: 12px;
    }

    .btn-login {
        border-radius: 12px;
    }
}

@media (max-width: 360px) {

    h2 {
        font-size: 0.95rem;
    }

    .signin {
        padding: 25px 12px;
    }
}

</style>
</head>

<body>

<div class="gradient-bg">
    <div class="blob"></div>
    <div class="blob blob-2"></div>
</div>

<div class="signin">
    <img src="manuals/logo (2).ico" class="company-logo">
    <h2 id="formTitle">Sign In</h2>

    <form class="form" id="authForm">
        <div class="inputBox">
            <input type="email" id="email" placeholder="Email" required>
        </div>

        <div class="inputBox">
            <input type="password" id="password" placeholder="Password" required>
        </div>

        <button class="btn-login" type="submit" id="submitBtn">Continue</button>
    </form>

    <div class="status" id="status"></div>
</div>

<script type="module">

import { initializeApp } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword,
createUserWithEmailAndPassword,
setPersistence,
browserSessionPersistence
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";


// LOAD CONFIG FROM JSON
const res = await fetch("./app.json");
const data = await res.json();
const firebaseConfig = data.firebaseConfig;


// INIT FIREBASE
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// SESSION ONLY
await setPersistence(auth, browserSessionPersistence);


// DOM
const form = document.getElementById("authForm");
const status = document.getElementById("status");

let isLogin = true;


// SUBMIT
form.addEventListener("submit", async (e) => {
e.preventDefault();

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

try {

status.innerText = "Processing...";

if (isLogin) {
await signInWithEmailAndPassword(auth, email, password);
} else {
await createUserWithEmailAndPassword(auth, email, password);
}

sessionStorage.setItem("verified", "true");

status.innerText = "Success! Redirecting...";

setTimeout(() => {
window.location.href = "dashboard.html";
}, 1200);

} catch (err) {
status.innerText = err.message.replace("Firebase: ", "");
}
});

</script>

</body>
</html>
