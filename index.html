<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="shortcut icon" href="manuals/logo (2).ico"> 
    
    <!-- SECURITY CACHE BLOCK -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <title>Enterprise Login | Liquid UI</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&display=swap');

        :root {
            --primary: #4a6616;
            --accent: #a3e635;
            --bg: #030712;
            --error: #ff6b6b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Quicksand', sans-serif;
        }

        body {
            background-color: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            padding: 20px;
        }

        /* BACKGROUND */
        .gradient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            filter: blur(80px);
        }

        .blob {
            position: absolute;
            background: var(--primary);
            width: 50vw;
            height: 50vw;
            border-radius: 50%;
            opacity: 0.4;
            animation: move 20s infinite alternate ease-in-out;
        }

        .blob-2 {
            background: #1e3a0a;
            width: 40vw;
            height: 40vw;
            right: 10%;
            top: 10%;
            animation: move2 18s infinite alternate ease-in-out;
        }

        @keyframes move {
            from {
                transform: translate(-10%, -10%) scale(1);
            }

            to {
                transform: translate(20%, 20%) scale(1.2);
            }
        }

        @keyframes move2 {
            from {
                transform: translate(10%, 10%) scale(1);
            }

            to {
                transform: translate(-20%, -15%) scale(1.1);
            }
        }

        /* LOGIN CARD */
        .signin {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            padding: 50px 35px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6);
            text-align: center;
        }

        .company-logo {
            width: 90px;
            margin-bottom: 25px;
            filter: drop-shadow(0 0 15px var(--accent));
        }

        h2 {
            color: #fff;
            font-size: 1.7rem;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 35px;
        }

        .form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .inputBox {
            position: relative;
        }

        .inputBox input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        .inputBox input:focus {
            border-color: var(--accent);
            background: rgba(0, 0, 0, 0.6);
            box-shadow: 0 0 15px rgba(163, 230, 53, 0.2);
        }

        .forgot-link {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
            cursor: pointer;
            text-decoration: none;
        }

        .forgot-link:hover {
            color: var(--accent);
        }

        .btn-login {
            margin-top: 10px;
            padding: 16px;
            background: linear-gradient(135deg, #ffffff, #d9f99d);
            color: #000;
            font-weight: 700;
            border: none;
            border-radius: 16px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(163, 230, 53, 0.4);
        }

        .status {
            margin-top: 20px;
            font-size: 0.9rem;
            min-height: 20px;
            line-height: 1.4;
        }

        .toggle-auth {
            margin-top: 25px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85rem;
        }

        .toggle-auth span {
            color: var(--accent);
            cursor: pointer;
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .signin {
                padding: 40px 20px;
            }

            h2 {
                font-size: 1.4rem;
            }

            .company-logo {
                width: 70px;
            }
        }
    </style>
</head>

<body>

    <div class="gradient-bg">
        <div class="blob"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="signin">
        <div class="content">

            <img src="logo.png" alt="Company Logo" class="company-logo">

            <h2 id="formTitle">Sign In</h2>

            <form class="form" id="authForm">

                <div class="inputBox">
                    <input type="email" id="email" placeholder="Email Address" required>
                </div>

                <div class="inputBox">
                    <input type="password" id="password" placeholder="Password" required>
                    <a class="forgot-link" id="forgotPassword">Forgot?</a>
                </div>

                <button type="submit" class="btn-login" id="submitBtn">
                    Continue
                </button>

            </form>

            <div class="status" id="status"></div>

            <div class="toggle-auth">
                <p id="toggleText">
                    Don't have an account?
                    <span id="switchMode">Sign Up</span>
                </p>
            </div>

        </div>
    </div>

    <script type="module">

        import { initializeApp }
        from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

        import {
            getAuth,
            signInWithEmailAndPassword,
            createUserWithEmailAndPassword,
            sendPasswordResetEmail,
            setPersistence,
            browserSessionPersistence
        }
        from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        // FIREBASE CONFIG

        const firebaseConfig = {
            apiKey: "AIzaSyAdWdihzNcva6QugwcJ5onhVv25bRzGOQI",
            authDomain: "aiterp-254c6.firebaseapp.com",
            databaseURL: "https://aiterp-254c6-default-rtdb.firebaseio.com",
            projectId: "aiterp-254c6",
            storageBucket: "aiterp-254c6.firebasestorage.app",
            messagingSenderId: "141769590506",
            appId: "1:141769590506:web:434df19c89511914657993",
            measurementId: "G-B4H74W4KCV"
        };

        // INITIALIZE FIREBASE

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // SESSION ONLY LOGIN
        await setPersistence(auth, browserSessionPersistence);

        // DOM ELEMENTS

        const authForm = document.getElementById("authForm");
        const status = document.getElementById("status");
        const formTitle = document.getElementById("formTitle");
        const submitBtn = document.getElementById("submitBtn");
        const switchMode = document.getElementById("switchMode");
        const toggleText = document.getElementById("toggleText");
        const forgotPasswordLink = document.getElementById("forgotPassword");

        let isLoginMode = true;

        // TOGGLE LOGIN/SIGNUP

        switchMode.addEventListener("click", toggleMode);

        function toggleMode() {

            isLoginMode = !isLoginMode;

            formTitle.innerText =
                isLoginMode ? "Sign In" : "Sign Up";

            submitBtn.innerText =
                isLoginMode ? "Continue" : "Create Account";

            forgotPasswordLink.style.display =
                isLoginMode ? "block" : "none";

            toggleText.innerHTML = isLoginMode
                ? `Don't have an account?
                   <span id="switchMode">Sign Up</span>`
                : `Already have an account?
                   <span id="switchMode">Sign In</span>`;

            document
                .getElementById("switchMode")
                .addEventListener("click", toggleMode);
        }

        // FORGOT PASSWORD

        forgotPasswordLink.addEventListener("click", async () => {

            const email = document
                .getElementById("email").value;

            if (!email) {

                status.style.color = "var(--error)";
                status.innerHTML =
                    "Enter your email first.";

                return;
            }

            try {

                await sendPasswordResetEmail(auth, email);

                status.style.color = "var(--accent)";
                status.innerHTML =
                    "Reset email sent successfully.";

            } catch (error) {

                status.style.color = "var(--error)";
                status.innerHTML = error.message;
            }
        });

        // LOGIN / SIGNUP

        authForm.addEventListener("submit", async (e) => {

            e.preventDefault();

            const email =
                document.getElementById("email").value;

            const password =
                document.getElementById("password").value;

            try {

                status.style.color = "#fff";

                status.innerHTML =
                    isLoginMode
                    ? "Authenticating..."
                    : "Creating account...";

                if (isLoginMode) {

                    await signInWithEmailAndPassword(
                        auth,
                        email,
                        password
                    );

                } else {

                    await createUserWithEmailAndPassword(
                        auth,
                        email,
                        password
                    );
                }

                // VERIFY SESSION

                sessionStorage.setItem(
                    "verified",
                    "true"
                );

                status.style.color = "var(--accent)";
                status.innerHTML =
                    "Login successful. Redirecting...";

                setTimeout(() => {

                    window.location.replace(
                        "dashboard.html"
                    );

                }, 1200);

            } catch (error) {

                console.error(error);

                status.style.color = "var(--error)";

                let msg = error.code
                    .replace("auth/", "")
                    .replaceAll("-", " ");

                status.innerHTML =
                    msg.charAt(0).toUpperCase() +
                    msg.slice(1);
            }
        });

        // BLOCK BACK BUTTON

        history.pushState(null, null, location.href);

        window.onpopstate = function () {
            history.go(1);
        };

    </script>

</body>
</html>
