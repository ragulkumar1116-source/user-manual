<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Secure Engineering Document Management System">
    <title>Enterprise Manual Portal | Secure View</title>
    
    <style>
        :root {
            --primary: #0f172a;
            --primary-hover: #1e293b;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --sidebar-bg: #f8fafc;
            --content-bg: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --radius: 8px;
            --header-height: 64px;
        }

        [data-theme="dark"] {
            --primary: #f8fafc;
            --primary-hover: #e2e8f0;
            --sidebar-bg: #0f172a;
            --content-bg: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border: #334155;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--content-bg);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: grid;
            grid-template-columns: 320px 1fr;
            transition: background 0.3s ease;
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }

        /* Mobile Header */
        .mobile-header {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--header-height);
            background: var(--sidebar-bg);
            border-bottom: 1px solid var(--border);
            z-index: 1000;
            padding: 0 20px;
            align-items: center;
            justify-content: space-between;
        }

        .menu-toggle {
            background: none;
            border: none;
            font-size: 24px;
            color: var(--text-primary);
            cursor: pointer;
            padding: 8px;
        }

        /* Sidebar */
        .sidebar {
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            font-size: 1.25rem;
            color: var(--accent);
            margin-bottom: 4px;
        }

        .logo svg {
            width: 32px;
            height: 32px;
        }

        .subtitle {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Search & Filter */
        .search-container {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
        }

        .search-box {
            position: relative;
            width: 100%;
        }

        .search-box input {
            width: 100%;
            padding: 10px 16px 10px 40px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--content-bg);
            color: var(--text-primary);
            font-size: 0.875rem;
            transition: all 0.2s;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .search-box svg {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            width: 18px;
            height: 18px;
        }

        .filter-tags {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            overflow-x: auto;
            padding-bottom: 4px;
        }

        .tag {
            padding: 4px 12px;
            background: var(--content-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 0.75rem;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .tag:hover, .tag.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        /* Document List */
        .doc-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .category {
            margin-bottom: 16px;
        }

        .category-title {
            padding: 8px 16px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .doc-item {
            padding: 12px 16px;
            margin: 4px 8px;
            border-radius: var(--radius);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s;
            border: 1px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .doc-item:hover {
            background: var(--content-bg);
            border-color: var(--border);
            transform: translateX(4px);
        }

        .doc-item.active {
            background: var(--accent);
            color: white;
            box-shadow: var(--shadow);
        }

        .doc-item.active .doc-meta {
            color: rgba(255, 255, 255, 0.8);
        }

        .doc-icon {
            width: 40px;
            height: 40px;
            background: rgba(59, 130, 246, 0.1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .doc-item.active .doc-icon {
            background: rgba(255, 255, 255, 0.2);
        }

        .doc-info {
            flex: 1;
            min-width: 0;
        }

        .doc-title {
            font-weight: 500;
            font-size: 0.875rem;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .doc-meta {
            font-size: 0.75rem;
            color: var(--text-secondary);
            display: flex;
            gap: 8px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--success);
            display: inline-block;
            margin-right: 4px;
        }

        /* Pull to refresh indicator */
        .pull-indicator {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-size: 0.875rem;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .pull-indicator.visible {
            opacity: 1;
        }

        .pull-indicator svg {
            margin-right: 8px;
            transition: transform 0.3s;
        }

        .pull-indicator.loading svg {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Main Viewer */
        .viewer {
            display: flex;
            flex-direction: column;
            background: #52525b;
            position: relative;
        }

        .viewer-toolbar {
            height: var(--header-height);
            background: var(--content-bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            box-shadow: var(--shadow);
            z-index: 10;
        }

        .toolbar-left {
            display: flex;
            align-items: center;
            gap: 16px;
            flex: 1;
            min-width: 0;
        }

        .breadcrumb {
            font-size: 0.875rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .breadcrumb svg {
            width: 16px;
            height: 16px;
        }

        .doc-title-main {
            font-weight: 600;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .toolbar-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn {
            padding: 8px 16px;
            border: 1px solid var(--border);
            background: var(--content-bg);
            color: var(--text-primary);
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 0.875rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
            font-weight: 500;
        }

        .btn:hover {
            background: var(--sidebar-bg);
            border-color: var(--text-secondary);
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            border-color: var(--accent-hover);
        }

        .btn-icon {
            padding: 8px;
            border-radius: 6px;
        }

        .zoom-controls {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 4px;
            background: var(--sidebar-bg);
            border-radius: 6px;
            margin-right: 12px;
        }

        .zoom-level {
            min-width: 60px;
            text-align: center;
            font-size: 0.875rem;
            font-weight: 500;
            font-variant-numeric: tabular-nums;
        }

        /* Security Watermark */
        .watermark {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-45deg);
            font-size: 4rem;
            font-weight: 900;
            color: rgba(0, 0, 0, 0.03);
            pointer-events: none;
            z-index: 5;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            user-select: none;
            white-space: nowrap;
        }

        [data-theme="dark"] .watermark {
            color: rgba(255, 255, 255, 0.03);
        }

        /* Frame Container */
        .frame-container {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: #52525b;
        }

        #doc-frame {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
            transition: transform 0.3s ease;
        }

        /* Loading States */
        .skeleton {
            background: linear-gradient(90deg, var(--border) 25%, var(--sidebar-bg) 50%, var(--border) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 4px;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 20;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .loading-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }

        .loading-text {
            font-size: 0.875rem;
            color: rgba(255, 255, 255, 0.8);
        }

        .progress-bar {
            width: 200px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            margin-top: 12px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.3s;
        }

        /* Error State */
        .error-state {
            position: absolute;
            inset: 0;
            background: var(--content-bg);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
        }

        .error-state.active {
            display: flex;
        }

        .error-icon {
            width: 64px;
            height: 64px;
            background: #fee2e2;
            color: #dc2626;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            font-size: 32px;
        }

        /* Toast Notifications */
        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .toast {
            background: var(--primary);
            color: white;
            padding: 12px 20px;
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 8px;
            animation: slideIn 0.3s ease;
            font-size: 0.875rem;
            max-width: 400px;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .toast.error {
            background: var(--danger);
        }

        .toast.success {
            background: var(--success);
        }

        /* Responsive */
        @media (max-width: 1024px) {
            body {
                grid-template-columns: 280px 1fr;
            }
        }

        @media (max-width: 768px) {
            body {
                grid-template-columns: 1fr;
            }
            
            .mobile-header {
                display: flex;
            }
            
            .sidebar {
                position: fixed;
                left: 0;
                top: var(--header-height);
                bottom: 0;
                width: 100%;
                z-index: 100;
                transform: translateX(-100%);
            }
            
            .sidebar.open {
                transform: translateX(0);
            }
            
            .viewer {
                margin-top: var(--header-height);
                height: calc(100vh - var(--header-height));
            }
            
            .zoom-controls {
                display: none;
            }
            
            .btn-text {
                display: none;
            }
        }

        /* Print Prevention */
        @media print {
            body { display: none; }
        }

        /* Context Menu Block */
        .context-block {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: none;
        }
    </style>
</head>
<body oncontextmenu="return false;" onkeydown="preventShortcut(event)">
    <!-- Mobile Header -->
    <div class="mobile-header">
        <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
        <div class="logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="16" y1="13" x2="8" y2="13"></line>
                <line x1="16" y1="17" x2="8" y2="17"></line>
                <polyline points="10 9 9 9 8 9"></polyline>
            </svg>
            <span>Engineering Portal</span>
        </div>
        <button class="btn btn-icon" onclick="toggleTheme()">🌓</button>
    </div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13"></line>
                    <line x1="16" y1="17" x2="8" y2="17"></line>
                </svg>
                <span>Engineering Portal</span>
            </div>
            <div class="subtitle">Secure Document Access</div>
        </div>

        <div class="search-container">
            <div class="search-box">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.35-4.35"></path>
                </svg>
                <input type="text" id="searchInput" placeholder="Search manuals..." onkeyup="filterDocs()">
            </div>
            <div class="filter-tags">
                <span class="tag active" onclick="filterCategory('all', this)">All</span>
                <span class="tag" onclick="filterCategory('plc', this)">PLC</span>
                <span class="tag" onclick="filterCategory('sensors', this)">Sensors</span>
                <span class="tag" onclick="filterCategory('network', this)">Network</span>
            </div>
        </div>

        <div class="pull-indicator" id="pullIndicator">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="23 4 23 10 17 10"></polyline>
                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
            </svg>
            <span>Pull to refresh</span>
        </div>

        <div class="doc-list" id="docList">
            <!-- Categories and items will be populated by JS -->
        </div>
    </aside>

    <!-- Main Viewer -->
    <main class="viewer">
        <div class="watermark" id="watermark">CONFIDENTIAL</div>
        
        <div class="viewer-toolbar">
            <div class="toolbar-left">
                <div class="breadcrumb">
                    <span>Manuals</span>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                    <span class="doc-title-main" id="currentTitle">Select a document</span>
                </div>
            </div>
            
            <div class="toolbar-right">
                <div class="zoom-controls">
                    <button class="btn btn-icon" onclick="zoom(-0.1)" title="Zoom Out">−</button>
                    <span class="zoom-level" id="zoomLevel">100%</span>
                    <button class="btn btn-icon" onclick="zoom(0.1)" title="Zoom In">+</button>
                    <button class="btn btn-icon" onclick="resetZoom()" title="Reset">⟲</button>
                </div>
                
                <button class="btn" onclick="toggleFullscreen()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>
                    </svg>
                    <span class="btn-text">Fullscreen</span>
                </button>
                
                <button class="btn btn-primary" onclick="requestDownload()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                    <span class="btn-text">Export</span>
                </button>
            </div>
        </div>

        <div class="frame-container" id="frameContainer">
            <div class="loading-overlay" id="loadingOverlay">
                <div class="spinner"></div>
                <div class="loading-text">Loading document...</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>

            <div class="error-state" id="errorState">
                <div class="error-icon">⚠</div>
                <h3>Failed to Load Document</h3>
                <p>The document could not be loaded. Please check your connection or try again.</p>
                <button class="btn btn-primary" onclick="retryLoad()" style="margin-top: 16px;">Retry</button>
            </div>

            <iframe id="doc-frame" src="" sandbox="allow-scripts allow-same-origin"></iframe>
        </div>
    </main>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        // Document Data
        const documents = [
            {
                id: 1,
                title: "PLC Setup Guide V2.1",
                file: "PLC_Setup_V1.pdf",
                category: "plc",
                size: "2.4 MB",
                updated: "2024-01-15",
                type: "Setup"
            },
            {
                id: 2,
                title: "Sensor Calibration Protocol",
                file: "Sensor_Calibration.pdf",
                category: "sensors",
                size: "1.8 MB",
                updated: "2024-01-12",
                type: "Calibration"
            },
            {
                id: 3,
                title: "Modbus TCP Wiring Map",
                file: "Modbus_Wiring.pdf",
                category: "network",
                size: "3.2 MB",
                updated: "2024-01-10",
                type: "Diagram"
            },
            {
                id: 4,
                title: "Troubleshooting FAQ",
                file: "Troubleshooting.pdf",
                category: "plc",
                size: "856 KB",
                updated: "2024-01-08",
                type: "Reference"
            },
            {
                id: 5,
                title: "Safety Interlock Manual",
                file: "Safety_Interlock.pdf",
                category: "plc",
                size: "4.1 MB",
                updated: "2024-01-05",
                type: "Safety"
            },
            {
                id: 6,
                title: "HMI Configuration Guide",
                file: "HMI_Config.pdf",
                category: "network",
                size: "2.9 MB",
                updated: "2024-01-03",
                type: "Config"
            }
        ];

        // State
        let currentDoc = null;
        let zoomScale = 1;
        let currentFilter = 'all';
        let touchStartY = 0;
        let isRefreshing = false;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderDocList();
            setupPullToRefresh();
            setupKeyboardShortcuts();
            
            // Simulate watermark with user info
            const username = "USER_" + Math.floor(Math.random() * 10000);
            document.getElementById('watermark').textContent = `CONFIDENTIAL - ${username} - ${new Date().toLocaleDateString()}`;
        });

        // Render Document List
        function renderDocList() {
            const list = document.getElementById('docList');
            const filtered = currentFilter === 'all' 
                ? documents 
                : documents.filter(d => d.category === currentFilter);
            
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const searched = filtered.filter(d => 
                d.title.toLowerCase().includes(searchTerm) || 
                d.type.toLowerCase().includes(searchTerm)
            );

            // Group by category
            const grouped = searched.reduce((acc, doc) => {
                if (!acc[doc.category]) acc[doc.category] = [];
                acc[doc.category].push(doc);
                return acc;
            }, {});

            let html = '';
            for (const [category, docs] of Object.entries(grouped)) {
                html += `
                    <div class="category">
                        <div class="category-title">
                            ${category.charAt(0).toUpperCase() + category.slice(1)}
                            <span>${docs.length}</span>
                        </div>
                        ${docs.map(doc => `
                            <div class="doc-item" onclick="loadDocument(${doc.id}, this)" data-id="${doc.id}">
                                <div class="doc-icon">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color: var(--accent);">
                                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                        <polyline points="14 2 14 8 20 8"></polyline>
                                    </svg>
                                </div>
                                <div class="doc-info">
                                    <div class="doc-title">${doc.title}</div>
                                    <div class="doc-meta">
                                        <span><span class="status-dot"></span>${doc.type}</span>
                                        <span>•</span>
                                        <span>${doc.size}</span>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }
            
            list.innerHTML = html || '<div style="padding: 24px; text-align: center; color: var(--text-secondary);">No documents found</div>';
        }

        // Load Document with Progress Simulation
        async function loadDocument(id, element) {
            const doc = documents.find(d => d.id === id);
            if (!doc || currentDoc === id) return;
            
            currentDoc = id;
            
            // Update UI
            document.querySelectorAll('.doc-item').forEach(el => el.classList.remove('active'));
            if (element) element.classList.add('active');
            
            document.getElementById('currentTitle').textContent = doc.title;
            
            // Show loading
            const overlay = document.getElementById('loadingOverlay');
            const progressFill = document.getElementById('progressFill');
            const errorState = document.getElementById('errorState');
            const frame = document.getElementById('doc-frame');
            
            overlay.classList.add('active');
            errorState.classList.remove('active');
            
            // Simulate progress
            let progress = 0;
            const progressInterval = setInterval(() => {
                progress += Math.random() * 30;
                if (progress > 90) progress = 90;
                progressFill.style.width = progress + '%';
            }, 200);
            
            try {
                // Simulate network delay for "full load operation" testing
                await new Promise(resolve => setTimeout(resolve, 1500));
                
                // Set source with security parameters
                const folderPath = "manuals/";
                const secureUrl = `${folderPath}${doc.file}#toolbar=0&navpanes=0&scrollbar=1&zoom=${zoomScale * 100}`;
                
                frame.src = secureUrl;
                
                frame.onload = () => {
                    clearInterval(progressInterval);
                    progressFill.style.width = '100%';
                    setTimeout(() => {
                        overlay.classList.remove('active');
                        showToast('Document loaded successfully', 'success');
                    }, 300);
                };
                
                frame.onerror = () => {
                    throw new Error('Failed to load');
                };
                
            } catch (error) {
                clearInterval(progressInterval);
                overlay.classList.remove('active');
                errorState.classList.add('active');
                showToast('Error loading document', 'error');
            }
            
            // Close mobile sidebar
            if (window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.remove('open');
            }
        }

        // Zoom Controls
        function zoom(delta) {
            zoomScale = Math.max(0.5, Math.min(2.0, zoomScale + delta));
            document.getElementById('zoomLevel').textContent = Math.round(zoomScale * 100) + '%';
            
            const frame = document.getElementById('doc-frame');
            if (frame.src) {
                // Reload with new zoom
                const currentSrc = frame.src;
                const baseUrl = currentSrc.split('#')[0];
                frame.src = baseUrl + `#toolbar=0&navpanes=0&zoom=${Math.round(zoomScale * 100)}`;
            }
        }

        function resetZoom() {
            zoomScale = 1;
            document.getElementById('zoomLevel').textContent = '100%';
            if (currentDoc) {
                const doc = documents.find(d => d.id === currentDoc);
                const frame = document.getElementById('doc-frame');
                frame.src = `manuals/${doc.file}#toolbar=0&navpanes=0&zoom=100`;
            }
        }

        // Filter Functions
        function filterDocs() {
            renderDocList();
        }

        function filterCategory(category, element) {
            currentFilter = category;
            document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
            element.classList.add('active');
            renderDocList();
        }

        // Pull to Refresh (Mobile)
        function setupPullToRefresh() {
            const sidebar = document.getElementById('sidebar');
            const indicator = document.getElementById('pullIndicator');
            
            sidebar.addEventListener('touchstart', (e) => {
                if (sidebar.scrollTop === 0) {
                    touchStartY = e.touches[0].clientY;
                }
            }, { passive: true });
            
            sidebar.addEventListener('touchmove', (e) => {
                if (sidebar.scrollTop === 0 && !isRefreshing) {
                    const touchY = e.touches[0].clientY;
                    const diff = touchY - touchStartY;
                    
                    if (diff > 0 && diff < 100) {
                        indicator.classList.add('visible');
                        indicator.style.transform = `translateY(${diff * 0.5}px)`;
                    }
                    
                    if (diff > 80) {
                        indicator.classList.add('loading');
                        indicator.querySelector('span').textContent = 'Release to refresh';
                    }
                }
            }, { passive: true });
            
            sidebar.addEventListener('touchend', (e) => {
                const touchY = e.changedTouches[0].clientY;
                const diff = touchY - touchStartY;
                
                if (diff > 80 && !isRefreshing) {
                    isRefreshing = true;
                    indicator.querySelector('span').textContent = 'Updating...';
                    
                    setTimeout(() => {
                        indicator.classList.remove('visible', 'loading');
                        indicator.style.transform = '';
                        indicator.querySelector('span').textContent = 'Pull to refresh';
                        isRefreshing = false;
                        renderDocList();
                        showToast('Library updated', 'success');
                    }, 1500);
                } else {
                    indicator.classList.remove('visible');
                    indicator.style.transform = '';
                }
            });
        }

        // Security & Utilities
        function preventShortcut(e) {
            // Disable Ctrl+S, Ctrl+P, Ctrl+U, F12
            if ((e.ctrlKey && (e.key === 's' || e.key === 'p' || e.key === 'u')) || 
                e.key === 'F12' || 
                (e.ctrlKey && e.shiftKey && e.key === 'I')) {
                e.preventDefault();
                showToast('Action blocked for security', 'error');
                return false;
            }
        }

        function requestDownload() {
            if (!currentDoc) {
                showToast('Please select a document first', 'error');
                return;
            }
            
            // Simulate authentication check
            showToast('Requesting secure download...', 'success');
            setTimeout(() => {
                alert('Download request submitted for approval.\nDocument will be sent to your registered email after verification.');
            }, 1000);
        }

        function retryLoad() {
            if (currentDoc) {
                const element = document.querySelector(`[data-id="${currentDoc}"]`);
                loadDocument(currentDoc, element);
            }
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        function toggleTheme() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme');
            html.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
        }

        // Toast System
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            
            const icon = type === 'success' ? '✓' : type === 'error' ? '✕' : 'ℹ';
            toast.innerHTML = `<span>${icon}</span> ${message}`;
            
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Setup additional security
        document.addEventListener('keydown', (e) => {
            if (e.key === 'PrintScreen') {
                navigator.clipboard.writeText('');
                showToast('Screenshots disabled', 'error');
            }
        });

        // Prevent drag and drop
        document.addEventListener('dragstart', (e) => e.preventDefault());
        document.addEventListener('drop', (e) => e.preventDefault());

        // Handle window resize
        window.addEventListener('resize', () => {
            if (window.innerWidth > 768) {
                document.getElementById('sidebar').classList.remove('open');
            }
        });
    </script>
</body>
</html>
