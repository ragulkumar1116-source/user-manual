<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library - Instrument Library V3.0</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="d-flex" id="wrapper">
        <div class="border-end bg-white" id="sidebar-wrapper">
            <div class="sidebar-heading text-center p-4">
                <img src="" alt="Logo" class="app-company-logo mb-2" style="max-height: 60px; max-width: 80%;">
                <h6 class="fw-bold app-company-name m-0 mt-2" style="color: #1c325e;">Company Name</h6>
            </div>
            <div class="list-group list-group-flush">
                <a href="index.html" class="list-group-item"><i class="fa-solid fa-house"></i> Dashboard</a>
                <a href="library.html" class="list-group-item active"><i class="fa-solid fa-list"></i> Library</a>
                <a href="add.html" class="list-group-item"><i class="fa-solid fa-plus"></i> Add Instrument</a>
                <a href="settings.html" class="list-group-item"><i class="fa-solid fa-gear"></i> Company Settings</a>
            </div>
        </div>

        <div id="page-content-wrapper" class="w-100 d-flex flex-column min-vh-100">
            <!-- Navbar -->
            <nav class="navbar px-3 py-2 d-flex justify-content-between align-items-center mb-3">
                <div class="d-flex align-items-center gap-2">
                    <button class="btn pill-nav-dark d-md-none" id="menu-toggle"><i class="fa-solid fa-bars"></i></button>
                    <div class="pill-nav-white d-none d-sm-flex">
                        <i class="fa-regular fa-clock text-success"></i> <span id="liveClock">Loading...</span>
                    </div>
                </div>
                <div class="text-white fw-bold d-none d-md-flex align-items-center gap-2">
                    <i class="fa-solid fa-folder-open"></i>
                    <span><span class="app-company-name">Company</span>_Instrument_Library</span>
                </div>
                <div class="d-flex align-items-center gap-2">
                    <div class="pill-nav-white text-success d-none d-sm-flex">
                        <i class="fa-solid fa-plug-circle-check"></i> System Online
                    </div>
                    <button class="btn pill-nav-dark" id="themeToggle"><i class="fa-solid fa-moon"></i></button>
                </div>
            </nav>

            <div class="container-fluid flex-grow-1 p-4 pt-2" id="main-content">
                <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
                    <h2 class="page-title mb-0">Instrument Library</h2>
                    <div class="d-flex flex-wrap flex-md-nowrap gap-2 align-items-center">
                        <div class="input-group" style="max-width: 300px;">
                            <span class="input-group-text bg-white border-end-0"><i class="fa-solid fa-search text-muted"></i></span>
                            <input type="text" class="form-control border-start-0 ps-0" id="searchInput" placeholder="Search instruments...">
                        </div>
                        <div class="dropdown">
                            <button class="btn btn-outline-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown"><i class="fa-solid fa-download me-2"></i>Export</button>
                            <ul class="dropdown-menu">
                                <li><a class="dropdown-item" href="#" onclick="exportExcel()"><i class="fa-solid fa-file-excel text-success me-2"></i>Excel (.xlsx)</a></li>
                                <li><a class="dropdown-item" href="#" onclick="exportCSV()"><i class="fa-solid fa-file-csv text-info me-2"></i>CSV</a></li>
                                <li><a class="dropdown-item" href="#" onclick="exportPDF()"><i class="fa-solid fa-file-pdf text-danger me-2"></i>PDF</a></li>
                                <li><hr class="dropdown-divider"></li>
                                <li><a class="dropdown-item" href="#" onclick="printLibrary()"><i class="fa-solid fa-print text-secondary me-2"></i>Print</a></li>
                            </ul>
                        </div>
                        <a href="add.html" class="btn btn-primary"><i class="fa-solid fa-plus me-2"></i>Add New</a>
                    </div>
                </div>

                <div class="card shadow-sm border-0">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0" id="libraryTable">
                                <thead class="table-light">
                                    <tr>
                                        <th>Image</th>
                                        <th>Instrument Name</th>
                                        <th>Manufacturer</th>
                                        <th>Model</th>
                                        <th>Category</th>
                                        <th>Type</th>
                                        <th>Communication</th>
                                        <th>Project</th>
                                        <th>Last Updated</th>
                                        <th class="text-end px-4">Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="libraryTableBody">
                                    <tr><td colspan="10" class="text-center py-5"><div class="spinner-border text-primary"></div></td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1060;">
        <div id="appToast" class="toast" role="alert">
            <div class="d-flex"><div class="toast-body fw-medium" id="toastMessage"></div><button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script type="module" src="js/app.js"></script>
    <script type="module" src="js/library.js"></script>

</body>
</html>
