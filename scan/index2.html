<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instrument Library Master View</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body {
    background: #f4f6f9;
}
.card {
    border-radius: 10px;
}
.table th {
    background: #0d6efd;
    color: white;
}
h3 {
    font-weight: bold;
}
</style>
</head>
<body>

<div class="container py-4">
    <div class="card shadow">
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
            <h3 class="m-0">Industrial Instrument Library</h3>
            <a href="index.html" class="btn btn-sm btn-light fw-bold">Back to Dashboard</a>
        </div>
        <div class="card-body">
            <div class="row">
                <div class="col-md-4">
                    <label class="form-label fw-bold">Category</label>
                    <select class="form-select" id="category">
                        <option value="">Select Category</option>
                    </select>
                </div>
                <div class="col-md-5">
                    <label class="form-label fw-bold">Instrument</label>
                    <select class="form-select" id="instrument">
                        <option value="">Select Instrument</option>
                    </select>
                </div>
                <div class="col-md-3 d-grid">
                    <label>&nbsp;</label>
                    <button class="btn btn-success fw-bold" id="btnLoad">
                        Load Configuration
                    </button>
                </div>
            </div>
            
            <hr class="my-4">
            
            <h5 class="fw-bold text-primary mb-3">Instrument Information</h5>
            <table class="table table-bordered">
                <tr>
                    <th width="250">Instrument Name</th>
                    <td id="iname">-</td>
                </tr>
                <tr>
                    <th>Communication</th>
                    <td id="comm">-</td>
                </tr>
                <tr>
                    <th>Protocol</th>
                    <td id="protocol">-</td>
                </tr>
                <tr>
                    <th>Baud Rate</th>
                    <td id="baud">-</td>
                </tr>
            </table>
            
            <hr class="my-4">
            
            <h5 class="fw-bold text-primary mb-3">Register Mapping</h5>
            <div class="table-responsive">
                <table class="table table-bordered table-striped">
                    <thead>
                        <tr>
                            <th width="5%">#</th>
                            <th width="30%">Parameter (Reg Name)</th>
                            <th width="10%">Address</th>
                            <th width="10%">Length</th>
                            <th width="20%">Data Type</th>
                            <th width="15%">Unit</th>
                            <th width="10%">R/W</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr>
                            <td colspan="6" class="text-center py-4 text-muted">
                                Select an Instrument and click "Load Configuration"
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script type="module">
import { db, ref, onValue } from './js/firebase.js';

let allInstruments = [];

document.addEventListener("DOMContentLoaded", () => {
    // Listen for data from our Firebase Backend
    onValue(ref(db, 'instruments'), (snapshot) => {
        allInstruments = [];
        const data = snapshot.val();
        if (data) {
            Object.keys(data).forEach(key => {
                allInstruments.push(data[key]);
            });
        }
        populateCategories();
    });

    document.getElementById('category').addEventListener('change', populateInstruments);
    document.getElementById('btnLoad').addEventListener('click', loadInstrument);
});

function populateCategories() {
    const catSelect = document.getElementById('category');
    const currentVal = catSelect.value;
    
    // Extract unique categories from all live instruments
    const categories = [...new Set(allInstruments.map(i => i.general?.category).filter(c => c))];
    
    let html = '<option value="">All Categories</option>';
    categories.forEach(cat => {
        html += `<option value="${cat}">${cat}</option>`;
    });
    catSelect.innerHTML = html;
    
    // Restore selection if it still exists
    if (categories.includes(currentVal)) {
        catSelect.value = currentVal;
    }
    
    populateInstruments();
}

function populateInstruments() {
    const instSelect = document.getElementById('instrument');
    const selectedCat = document.getElementById('category').value;
    
    let html = '<option value="">Select Instrument...</option>';
    
    let filtered = allInstruments;
    if (selectedCat) {
        filtered = allInstruments.filter(i => i.general?.category === selectedCat);
    }
    
    filtered.forEach(inst => {
        // Using ID as value, showing Name
        html += `<option value="${inst.id}">${inst.general?.name || 'Unnamed Instrument'}</option>`;
    });
    
    instSelect.innerHTML = html;
}

function loadInstrument() {
    const instId = document.getElementById('instrument').value;
    if (!instId) {
        alert("Please select an instrument first.");
        return;
    }
    
    const obj = allInstruments.find(i => i.id === instId);
    if (!obj) return;
    
    // Populate General Info
    document.getElementById('iname').innerHTML = obj.general?.name || '-';
    document.getElementById('comm').innerHTML = obj.communication?.interface || '-';
    document.getElementById('protocol').innerHTML = obj.communication?.protocol || '-';
    document.getElementById('baud').innerHTML = obj.communication?.baud_rate || '-'; 

    // Populate Registers Table
    let html = "";
    if (obj.registers && obj.registers.length > 0) {
        obj.registers.forEach((r, i) => {
            html += `
            <tr>
                <td>${i + 1}</td>
                <td class="fw-bold">${r.name || '-'}</td>
                <td>${r.address || '-'}</td>
                <td>${r.length || '1'}</td>
                <td><span class="badge bg-secondary">${r.dtype || '-'}</span></td>
                <td>${r.unit || '-'}</td>
                <td>${r.rw || 'R'}</td>
            </tr>
            `;
        });
    } else {
        html = '<tr><td colspan="7" class="text-center py-4 text-muted">No registers configured for this instrument.</td></tr>';
    }
    
    document.getElementById("tableBody").innerHTML = html;
}
</script>

</body>
</html>
