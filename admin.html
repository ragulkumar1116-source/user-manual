<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>License Command Center Pro</title>
    <style>
        :root { 
            --primary: #e94560; --bg: #0f3460; --dark: #1a1a2e; 
            --card: #16213e; --text: #ffffff; --success: #4eff8a; 
            --warning: #f1c40f; --danger: #ff4e4e; --info: #4cc9f0;
        }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1300px; margin: 0 auto; }
        
        /* Stats Dashboard */
        .stats-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 12px; border-left: 5px solid var(--primary); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .stat-card h4 { margin: 0; font-size: 0.8rem; text-transform: uppercase; color: #94a3b8; }
        .stat-card .value { font-size: 1.8rem; font-weight: bold; margin-top: 10px; }

        /* Forms */
        .panel { background: var(--card); padding: 25px; border-radius: 12px; margin-bottom: 30px; border: 1px solid #1e293b; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 15px; }
        .input-group { display: flex; flex-direction: column; }
        label { font-size: 0.75rem; color: #94a3b8; margin-bottom: 5px; font-weight: bold; }
        input, select { background: #0f172a; border: 1px solid #334155; color: white; padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--primary); }
        
        /* Table */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #1e293b; padding: 15px; text-align: left; color: #94a3b8; font-size: 0.75rem; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #1e293b; font-size: 0.85rem; }
        
        .badge { padding: 4px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: bold; }
        .st-active { background: rgba(78, 255, 138, 0.1); color: var(--success); }
        .st-waiting { background: rgba(241, 196, 15, 0.1); color: var(--warning); }
        .st-expired { background: rgba(255, 78, 78, 0.1); color: var(--danger); }
        .st-future { background: rgba(76, 201, 240, 0.1); color: var(--info); }

        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-main { background: var(--primary); color: white; width: 100%; margin-top: 20px; font-size: 1rem; }
        .btn-edit { background: #334155; color: white; margin-right: 5px; }
        .btn-del { background: rgba(255, 78, 78, 0.1); color: var(--danger); }
        
        .time-box { font-size: 0.75rem; color: #94a3b8; line-height: 1.4; }
        .duration-text { font-weight: bold; color: var(--info); }
    </style>
</head>
<body>

<div class="container">
    <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
        <div>
            <h1 style="margin:0; color: var(--primary);">License Management</h1>
            <p style="color: #94a3b8; margin: 5px 0 0;">Precision activation & company tracking</p>
        </div>
    </header>

    <div class="stats-bar">
        <div class="stat-card" style="border-left-color: var(--info);">
            <h4>Total Partners</h4>
            <div class="value" id="stat-total">0</div>
        </div>
        <div class="stat-card" style="border-left-color: var(--success);">
            <h4>Currently Live</h4>
            <div class="value" id="stat-active" style="color: var(--success);">0</div>
        </div>
        <div class="stat-card" style="border-left-color: var(--warning);">
            <h4>Ending Soon</h4>
            <div class="value" id="stat-waiting" style="color: var(--warning);">0</div>
        </div>
        <div class="stat-card" style="border-left-color: var(--danger);">
            <h4>Inactive</h4>
            <div class="value" id="stat-expired" style="color: var(--danger);">0</div>
        </div>
    </div>

    <div class="panel">
        <h3 id="form-title" style="margin-top:0;">License Configuration</h3>
        <div class="form-grid">
            <div class="input-group">
                <label>Company/User Name</label>
                <input type="text" id="custName" placeholder="e.g. Acme Corp">
            </div>
            <div class="input-group">
                <label>License Key (ID)</label>
                <input type="text" id="licKey" placeholder="e.g. ACME-2024-XP">
            </div>
            <div class="input-group">
                <label>Domain Lock</label>
                <input type="text" id="custDomain" placeholder="e.g. acme.com">
            </div>
            <div class="input-group">
                <label>Start Date & Time</label>
                <input type="datetime-local" id="startDate">
            </div>
            <div class="input-group">
                <label>End Date & Time</label>
                <input type="datetime-local" id="endDate">
            </div>
            <div class="input-group">
                <label>Manual Override Status</label>
                <select id="licStatus">
                    <option value="active">Permit Access</option>
                    <option value="expired">Revoke Access</option>
                </select>
            </div>
        </div>
        <button class="btn btn-main" onclick="saveLicense()">Update & Deploy License</button>
    </div>

    <div class="panel">
        <h3 style="margin-top:0;">Active Database</h3>
        <table>
            <thead>
                <tr>
                    <th>Company</th>
                    <th>Timeline (Start → End)</th>
                    <th>Total Duration</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAMnnp5WiV3HAlPSUX73GqG6zxwQRXSpuA",
        authDomain: "lickey-33267.firebaseapp.com",
        databaseURL: "https://lickey-33267-default-rtdb.firebaseio.com",
        projectId: "lickey-33267",
        storageBucket: "lickey-33267.firebasestorage.app",
        messagingSenderId: "283310739978",
        appId: "1:283310739978:web:bc2887db5e9ce5d9ec05f3",
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Format for datetime-local input
    function formatForInput(ts) {
        const d = new Date(ts);
        return d.getFullYear() + '-' + 
               String(d.getMonth() + 1).padStart(2, '0') + '-' + 
               String(d.getDate()).padStart(2, '0') + 'T' + 
               String(d.getHours()).padStart(2, '0') + ':' + 
               String(d.getMinutes()).padStart(2, '0');
    }

    // Calculation Logic
    function getDuration(start, end) {
        const diff = end - start;
        if (diff <= 0) return "Invalid Range";
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
        return `${days}d ${hours}h`;
    }

    window.saveLicense = function() {
        const key = document.getElementById('licKey').value.trim();
        const startRaw = document.getElementById('startDate').value;
        const endRaw = document.getElementById('endDate').value;
        
        if (!key || !startRaw || !endRaw) return alert("Please set all dates and names!");

        const data = {
            user: document.getElementById('custName').value,
            domain: document.getElementById('custDomain').value || "",
            startTime: new Date(startRaw).getTime(),
            expiry: new Date(endRaw).getTime(),
            status: document.getElementById('licStatus').value
        };

        set(ref(db, 'licenses/' + key), data).then(() => { 
            alert("Database Synced!"); 
            resetForm(); 
        });
    };

    onValue(ref(db, 'licenses'), (snapshot) => {
        const body = document.getElementById('table-body');
        body.innerHTML = "";
        const data = snapshot.val();
        let stats = { total: 0, active: 0, waiting: 0, expired: 0 };
        const now = Date.now();

        if (data) {
            for (let key in data) {
                const lic = data[key];
                stats.total++;

                let state = lic.status;
                if (now < lic.startTime) state = "future";
                else if (now > lic.expiry) state = "expired";
                else if (lic.expiry - now < (3 * 24 * 60 * 60 * 1000)) state = "waiting";

                if (state === 'active') stats.active++;
                else if (state === 'waiting') { stats.active++; stats.waiting++; }
                else stats.expired++;

                const row = `
                    <tr>
                        <td>
                            <div style="font-weight:bold;">${lic.user}</div>
                            <div style="font-size:0.7rem; color:#94a3b8;">Key: ${key}</div>
                        </td>
                        <td class="time-box">
                            S: ${new Date(lic.startTime).toLocaleString()}<br>
                            E: ${new Date(lic.expiry).toLocaleString()}
                        </td>
                        <td class="duration-text">${getDuration(lic.startTime, lic.expiry)}</td>
                        <td><span class="badge st-${state}">${state}</span></td>
                        <td>
                            <button class="btn btn-edit" onclick="editLic('${key}', '${lic.user}', '${lic.domain}', ${lic.startTime}, ${lic.expiry}, '${lic.status}')">Modify</button>
                            <button class="btn btn-del" onclick="deleteLic('${key}')">Remove</button>
                        </td>
                    </tr>
                `;
                body.innerHTML += row;
            }
        }
        updateStats(stats);
    });

    function updateStats(s) {
        document.getElementById('stat-total').innerText = s.total;
        document.getElementById('stat-active').innerText = s.active;
        document.getElementById('stat-waiting').innerText = s.waiting;
        document.getElementById('stat-expired').innerText = s.expired;
    }

    window.editLic = (key, user, dom, start, end, status) => {
        document.getElementById('licKey').value = key;
        document.getElementById('custName').value = user;
        document.getElementById('custDomain').value = (dom === 'undefined' || dom === 'null') ? '' : dom;
        document.getElementById('startDate').value = formatForInput(start);
        document.getElementById('endDate').value = formatForInput(end);
        document.getElementById('licStatus').value = status;
        document.getElementById('form-title').innerText = "Modifying: " + user;
        window.scrollTo({top: 0, behavior: 'smooth'});
    };

    window.deleteLic = (k) => { if(confirm("Permanently remove key?")) remove(ref(db, 'licenses/'+k)); };

    function resetForm() {
        document.getElementById('custName').value = "";
        document.getElementById('licKey').value = "";
        document.getElementById('custDomain').value = "";
        document.getElementById('startDate').value = "";
        document.getElementById('endDate').value = "";
        document.getElementById('form-title').innerText = "License Configuration";
    }
</script>
</body>
</html>
