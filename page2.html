<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="shortcut icon" href="manuals/logo (2).ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AIT Document Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        /* ──────────────────────────────────────────────
           TOKENS
        ────────────────────────────────────────────── */
        :root {
            --navy:        #0d1b2a;
            --navy-mid:    #162336;
            --navy-soft:   #1e3149;
            --gold:        #e8b84b;
            --gold-dim:    #c99c30;
            --teal:        #27d3f5;
            --green:       #10b981;
            --amber:       #f59e0b;
            --orange:      #ff5b00;
            --blue:        #3b82f6;
            --violet:      #8b5cf6;
            --red:         #ef4444;
            --sidebar-w:   340px;
            --header-h:    68px;
            --radius-lg:   16px;
            --radius-md:   10px;
            --radius-sm:   6px;
            --shadow-sm:   0 1px 4px rgba(0,0,0,.18);
            --shadow-md:   0 4px 20px rgba(0,0,0,.25);
            --shadow-glow: 0 0 24px rgba(232,184,75,.15);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --transition:  all .22s cubic-bezier(.4,0,.2,1);
        }

        /* ──────────────────────────────────────────────
           RESET & BASE
        ────────────────────────────────────────────── */
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--navy);
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            display: grid;
            grid-template-columns: var(--sidebar-w) 1fr;
            color: #cbd5e1;
        }

        /* ──────────────────────────────────────────────
           SIDEBAR
        ────────────────────────────────────────────── */
        .sidebar {
            background: var(--navy-mid);
            border-right: 1px solid rgba(255,255,255,.06);
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            position: relative;
            z-index: 10;
        }

        /* Subtle vertical gradient stripe on sidebar right edge */
        .sidebar::after {
            content: '';
            position: absolute;
            right: 0; top: 0; bottom: 0;
            width: 1px;
            background: linear-gradient(to bottom, transparent, var(--gold) 40%, var(--teal) 70%, transparent);
            opacity: .4;
        }

        /* ── Logo / Header ── */
        .sidebar-header {
            padding: 0 24px;
            height: var(--header-h);
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--navy);
            border-bottom: 1px solid rgba(255,255,255,.05);
            flex-shrink: 0;
            position: relative;
        }

        .logo-ring {
            width: 38px; height: 38px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--gold), var(--gold-dim));
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 16px rgba(232,184,75,.35);
            flex-shrink: 0;
        }

        .logo-ring img { width: 24px; height: 24px; object-fit: contain; border-radius: 4px; }

        .logo-text {
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: .95rem;
            line-height: 1.2;
        }

        .logo-text span {
            display: block;
            font-weight: 400;
            font-size: .7rem;
            color: #64748b;
            letter-spacing: .08em;
            text-transform: uppercase;
        }

        /* ── Search ── */
        .search-wrap {
            padding: 16px 18px;
            background: var(--navy-mid);
            border-bottom: 1px solid rgba(255,255,255,.05);
            flex-shrink: 0;
        }

        .search-inner {
            position: relative;
        }

        .search-inner svg {
            position: absolute;
            left: 12px; top: 50%;
            transform: translateY(-50%);
            color: #475569;
            pointer-events: none;
        }

        .search-inner input {
            width: 100%;
            padding: 11px 14px 11px 38px;
            background: rgba(255,255,255,.05);
            border: 1px solid rgba(255,255,255,.08);
            border-radius: var(--radius-md);
            color: #e2e8f0;
            font-family: 'DM Sans', sans-serif;
            font-size: .92rem;
            transition: var(--transition);
            -webkit-appearance: none;
        }

        .search-inner input::placeholder { color: #475569; }

        .search-inner input:focus {
            outline: none;
            border-color: var(--gold);
            background: rgba(232,184,75,.06);
            box-shadow: 0 0 0 3px rgba(232,184,75,.1);
        }

        /* ── Filter Tags ── */
        .filter-tags {
            display: flex;
            gap: 7px;
            padding: 12px 18px;
            overflow-x: auto;
            border-bottom: 1px solid rgba(255,255,255,.05);
            background: var(--navy-mid);
            scrollbar-width: none;
            -ms-overflow-style: none;
            flex-shrink: 0;
        }

        .filter-tags::-webkit-scrollbar { display: none; }

        .tag {
            padding: 6px 14px;
            border-radius: 20px;
            font-family: 'Poppins', sans-serif;
            font-size: .72rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            border: 1.5px solid transparent;
            transition: var(--transition);
            touch-action: manipulation;
            min-height: 32px;
            display: flex;
            align-items: center;
            letter-spacing: .03em;
            text-transform: uppercase;
        }

        .tag:active { transform: scale(.95); }
        .tag.active { transform: scale(1.04); box-shadow: var(--shadow-md); }

        /* ── Document List ── */
        .doc-list {
            flex: 1;
            overflow-y: auto;
            padding: 16px 14px;
            background: var(--navy-mid);
            -webkit-overflow-scrolling: touch;
        }

        .doc-list::-webkit-scrollbar { width: 4px; }
        .doc-list::-webkit-scrollbar-track { background: transparent; }
        .doc-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,.12); border-radius: 20px; }

        .category-group { margin-bottom: 24px; }

        .category-header {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Poppins', sans-serif;
            font-size: .67rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .1em;
            margin-bottom: 10px;
            padding: 8px 6px;
            position: sticky;
            top: 0;
            background: var(--navy-mid);
            z-index: 5;
        }

        .category-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

        .doc-item {
            padding: 13px 14px;
            margin: 6px 0;
            border-radius: var(--radius-md);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 13px;
            background: rgba(255,255,255,.03);
            border: 1px solid rgba(255,255,255,.06);
            transition: var(--transition);
            min-height: 68px;
            position: relative;
            overflow: hidden;
        }

        /* Hover shimmer line */
        .doc-item::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 3px;
            background: var(--gold);
            border-radius: 2px;
            opacity: 0;
            transform: scaleY(.3);
            transition: var(--transition);
        }

        .doc-item:hover {
            background: rgba(255,255,255,.07);
            border-color: rgba(255,255,255,.12);
            transform: translateX(4px);
        }

        .doc-item:hover::before { opacity: 1; transform: scaleY(1); }

        .doc-item.active {
            background: linear-gradient(135deg, rgba(232,184,75,.15), rgba(232,184,75,.06));
            border-color: rgba(232,184,75,.3);
            box-shadow: 0 2px 16px rgba(232,184,75,.1);
        }

        .doc-item.active::before { opacity: 1; transform: scaleY(1); }
        .doc-item.active .doc-title { color: #f1f5f9; }
        .doc-item.active .doc-meta { color: rgba(255,255,255,.55); }
        .doc-item.active .badge {
            background: rgba(232,184,75,.15) !important;
            color: var(--gold) !important;
        }

        .doc-item:active { transform: scale(.98); }

        .doc-icon {
            width: 40px; height: 40px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,.06);
            font-size: 18px;
            flex-shrink: 0;
        }

        .doc-info { flex: 1; min-width: 0; }

        .doc-title {
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
            font-size: .88rem;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #e2e8f0;
        }

        .doc-meta {
            display: flex;
            gap: 7px;
            align-items: center;
            font-size: .75rem;
            color: #64748b;
            flex-wrap: wrap;
        }

        .badge {
            padding: 2px 9px;
            border-radius: 20px;
            font-size: .65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .05em;
        }

        /* ──────────────────────────────────────────────
           VIEWER (right panel)
        ────────────────────────────────────────────── */
        .viewer {
            display: flex;
            flex-direction: column;
            background: var(--navy);
            height: 100vh;
            height: 100dvh;
        }

        /* ── Toolbar ── */
        .viewer-toolbar {
            height: var(--header-h);
            background: rgba(13,27,42,.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,.06);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            flex-shrink: 0;
            gap: 14px;
        }

        .toolbar-left {
            display: flex;
            align-items: center;
            gap: 14px;
            min-width: 0;
        }

        .breadcrumb-icon {
            width: 36px; height: 36px;
            border-radius: 10px;
            background: rgba(232,184,75,.12);
            border: 1px solid rgba(232,184,75,.2);
            display: flex; align-items: center; justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
            transition: var(--transition);
        }

        .doc-title-main {
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            color: #f1f5f9;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .toolbar-actions { display: flex; gap: 10px; flex-shrink: 0; }

        .btn {
            padding: 9px 18px;
            border: 1.5px solid rgba(255,255,255,.1);
            background: rgba(255,255,255,.05);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-size: .8rem;
            font-weight: 600;
            color: #cbd5e1;
            display: flex;
            align-items: center;
            gap: 7px;
            transition: var(--transition);
            white-space: nowrap;
            touch-action: manipulation;
            letter-spacing: .02em;
        }

        .btn-gold {
            background: linear-gradient(135deg, var(--gold), var(--gold-dim));
            border-color: transparent;
            color: var(--navy);
            box-shadow: 0 2px 12px rgba(232,184,75,.3);
        }

        .btn-gold:hover {
            box-shadow: 0 4px 20px rgba(232,184,75,.45);
            transform: translateY(-1px);
        }

        .btn:hover:not(.btn-gold) {
            background: rgba(255,255,255,.1);
            border-color: rgba(255,255,255,.2);
            color: white;
            transform: translateY(-1px);
        }

        .btn:active { transform: scale(.96) !important; }

        /* ── Frame ── */
        .frame-wrap {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .frame-container {
            flex: 1;
            background: #1a2332;
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-md), inset 0 0 0 1px rgba(255,255,255,.06);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* top accent line */
        .frame-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--gold), var(--teal));
            z-index: 2;
            opacity: 0;
            transition: opacity .4s;
        }

        .frame-container.loaded::before { opacity: 1; }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            -webkit-overflow-scrolling: touch;
            display: none;
        }

        /* ── Empty State ── */
        .empty-state {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            text-align: center;
            background: transparent;
        }

        .empty-icon-wrap {
            width: 100px; height: 100px;
            border-radius: 28px;
            background: rgba(232,184,75,.07);
            border: 1px solid rgba(232,184,75,.15);
            display: flex; align-items: center; justify-content: center;
            font-size: 44px;
            margin-bottom: 24px;
            animation: float 3.5s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50%       { transform: translateY(-10px); }
        }

        .empty-state h3 {
            font-family: 'Poppins', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            color: #e2e8f0;
            margin-bottom: 8px;
        }

        .empty-state p { font-size: .88rem; color: #475569; max-width: 260px; }

        /* Animated dots */
        .dots { display: flex; gap: 8px; margin-top: 30px; }
        .dot {
            width: 8px; height: 8px; border-radius: 50%;
            animation: pulse-dot 1.5s ease-in-out infinite;
        }
        .dot:nth-child(1) { background: var(--gold); animation-delay: 0s; }
        .dot:nth-child(2) { background: var(--teal); animation-delay: .25s; }
        .dot:nth-child(3) { background: var(--violet); animation-delay: .5s; }

        @keyframes pulse-dot {
            0%, 100% { opacity: .3; transform: scale(.8); }
            50%       { opacity: 1; transform: scale(1.2); }
        }

        /* ──────────────────────────────────────────────
           STATS BAR (bottom of sidebar)
        ────────────────────────────────────────────── */
        .sidebar-footer {
            padding: 14px 18px;
            border-top: 1px solid rgba(255,255,255,.05);
            background: var(--navy);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-family: 'Poppins', sans-serif;
            font-size: .95rem;
            font-weight: 700;
            color: var(--gold);
        }

        .stat-label {
            font-size: .65rem;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: .06em;
        }

        .status-dot-live {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 8px rgba(16,185,129,.6);
            animation: blink 2s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50%       { opacity: .4; }
        }

        /* ──────────────────────────────────────────────
           MOBILE
        ────────────────────────────────────────────── */
        .sidebar-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.65);
            backdrop-filter: blur(4px);
            z-index: 99;
            opacity: 0;
            transition: opacity .3s;
        }

        .sidebar-backdrop.active { display: block; opacity: 1; }

        .mobile-header { display: none; }

        @media (max-width: 768px) {
            body { grid-template-columns: 1fr; }

            .sidebar {
                position: fixed;
                left: -100%;
                top: 0; bottom: 0;
                width: 88%;
                max-width: 340px;
                z-index: 100;
                transition: left .3s cubic-bezier(.4,0,.2,1);
                box-shadow: 4px 0 40px rgba(0,0,0,.5);
            }

            .sidebar.open { left: 0; }

            .mobile-header {
                display: flex;
                position: fixed;
                top: 0; left: 0; right: 0;
                height: var(--header-h);
                background: var(--navy-mid);
                border-bottom: 1px solid rgba(255,255,255,.06);
                z-index: 50;
                padding: 0 16px;
                align-items: center;
                justify-content: space-between;
            }

            .mobile-header .logo-text { font-size: .85rem; }

            .hamburger {
                width: 40px; height: 40px;
                border-radius: var(--radius-sm);
                background: rgba(255,255,255,.07);
                border: 1px solid rgba(255,255,255,.08);
                display: flex; flex-direction: column; align-items: center; justify-content: center;
                gap: 5px;
                cursor: pointer;
            }

            .hamburger span {
                display: block;
                width: 18px; height: 2px;
                background: #94a3b8;
                border-radius: 2px;
                transition: var(--transition);
            }

            .viewer {
                margin-top: var(--header-h);
                height: calc(100vh - var(--header-h));
                height: calc(100dvh - var(--header-h));
            }

            .viewer-toolbar { display: none; }

            .frame-wrap {
                padding: 12px;
                padding-bottom: calc(12px + var(--safe-bottom));
            }

            .frame-container { border-radius: var(--radius-md); }

            .doc-item { min-height: 72px; }
        }

        @media (min-width: 769px) {
            .sidebar-backdrop { display: none !important; }
        }

        /* ──────────────────────────────────────────────
           ENTRANCE ANIMATIONS
        ────────────────────────────────────────────── */
        .sidebar-header,
        .search-wrap,
        .filter-tags,
        .doc-list,
        .sidebar-footer {
            animation: slide-in .4s ease both;
        }

        .search-wrap  { animation-delay: .05s; }
        .filter-tags  { animation-delay: .1s; }
        .doc-list     { animation-delay: .15s; }
        .sidebar-footer{ animation-delay: .2s; }

        @keyframes slide-in {
            from { opacity: 0; transform: translateX(-12px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        .viewer-toolbar { animation: fade-down .4s ease .1s both; }
        .frame-wrap     { animation: fade-up .45s ease .15s both; }

        @keyframes fade-down {
            from { opacity: 0; transform: translateY(-8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes fade-up {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ──────────────────────────────────────────────
           NO RESULTS
        ────────────────────────────────────────────── */
        .no-results {
            text-align: center;
            padding: 48px 24px;
            color: #475569;
        }

        .no-results .nr-icon { font-size: 40px; margin-bottom: 14px; opacity: .5; }
        .no-results p { font-size: .88rem; }
    </style>
</head>
<body>

<!-- Backdrop -->
<div class="sidebar-backdrop" id="backdrop" onclick="toggleSidebar()"></div>

<!-- Mobile Header -->
<div class="mobile-header">
    <div class="hamburger" onclick="toggleSidebar()" aria-label="Open menu">
        <span></span><span></span><span></span>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
        <div class="logo-ring" style="width:30px;height:30px;">
            <img src="manuals/logo (2).ico" alt="AIT Logo">
        </div>
        <div class="logo-text" style="color:#e2e8f0;">AIT Portal<span>Documents</span></div>
    </div>
    <div style="width:40px;"></div>
</div>

<!-- ── SIDEBAR ── -->
<aside class="sidebar" id="sidebar">

    <div class="sidebar-header">
        <div class="logo-ring">
            <img src="manuals/logo (2).ico" alt="Logo">
        </div>
        <div class="logo-text" style="color:#e2e8f0;">
            AIT Document Portal
            <span>Enterprise Knowledge Base</span>
        </div>
    </div>

    <div class="search-wrap">
        <div class="search-inner">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input type="text" id="searchInput" placeholder="Search documents…" onkeyup="renderDocs()" autocomplete="off">
        </div>
    </div>

    <div class="filter-tags" id="filterContainer"></div>

    <div class="doc-list" id="docList"></div>

    <div class="sidebar-footer">
        <div class="stat-item">
            <div class="stat-value" id="statTotal">–</div>
            <div class="stat-label">Documents</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="statCategories">–</div>
            <div class="stat-label">Categories</div>
        </div>
        <div class="stat-item" style="display:flex;align-items:center;gap:7px;">
            <div class="status-dot-live"></div>
            <div>
                <div class="stat-value" style="font-size:.75rem;color:var(--green);">Online</div>
                <div class="stat-label">Status</div>
            </div>
        </div>
    </div>
</aside>

<!-- ── VIEWER ── -->
<main class="viewer">
    <div class="viewer-toolbar">
        <div class="toolbar-left">
            <div class="breadcrumb-icon" id="toolbarIcon">📄</div>
            <div class="doc-title-main" id="currentTitle">Select a document to preview</div>
        </div>
        <div class="toolbar-actions">
            <button class="btn btn-gold" onclick="openInNewTab()" id="openBtn" style="display:none;">
                <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                    <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/>
                    <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
                </svg>
                Open Full
            </button>
        </div>
    </div>

    <div class="frame-wrap">
        <div class="frame-container" id="frameContainer">
            <div class="empty-state" id="emptyState">
                <div class="empty-icon-wrap">📂</div>
                <h3>No Document Selected</h3>
                <p>Pick any document from the sidebar to start previewing it here.</p>
                <div class="dots">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
            </div>
            <iframe id="doc-frame" title="Document viewer"></iframe>
        </div>
    </div>
</main>

<script>

   CONFIGURATION

function addDoc({ title, file, category, size = 'PDF', icon = '📄' }) {

document.addEventListener('DOMContentLoaded', () => {
    renderFilters();
    renderDocs();
    updateStats();

    window.addEventListener('resize', () => {
        if (window.innerWidth > 768) {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('backdrop').classList.remove('active');
            document.body.style.overflow = '';
        }
    });
});

/* ── STATS ── */
function updateStats() {
    document.getElementById('statTotal').textContent = documents.length;
    const uniqueCats = new Set(documents.map(d => d.category)).size;
    document.getElementById('statCategories').textContent = uniqueCats;
}

/* ── FILTERS ── */
function renderFilters() {
    const container = document.getElementById('filterContainer');
    const visible   = categories.filter(c => c.showInList !== false);

    container.innerHTML = visible.map((cat, i) => `
        <button class="tag ${i === 0 ? 'active' : ''}"
                onclick="setFilter('${cat.name}', this)"
                style="background:${i === 0 ? cat.color : cat.color + '22'};
                       color:${i === 0 ? '#fff' : cat.color};
                       border-color:${cat.color}55;"
                aria-pressed="${i === 0}">
            ${cat.name}
        </button>
    `).join('');
}

function setFilter(name, btn) {
    currentFilter = name;
    document.querySelectorAll('.tag').forEach(b => {
        const cat = categories.find(c => c.name === b.textContent.trim());
        if (cat) {
            b.style.background  = cat.color + '22';
            b.style.color       = cat.color;
            b.style.borderColor = cat.color + '55';
            b.classList.remove('active');
        }
    });
    const activeCat = categories.find(c => c.name === name);
    if (activeCat) {
        btn.style.background  = activeCat.color;
        btn.style.color       = '#fff';
        btn.style.borderColor = activeCat.color;
        btn.classList.add('active');
    }
    renderDocs();
}

/* ── RENDER DOCS ── */
function renderDocs() {
    const list   = document.getElementById('docList');
    const search = document.getElementById('searchInput').value.toLowerCase();

    let filtered = documents.filter(d =>
        d.title.toLowerCase().includes(search) &&
        (currentFilter === 'All' || d.category === currentFilter)
    );

    if (!filtered.length) {
        list.innerHTML = `
            <div class="no-results">
                <div class="nr-icon">🔍</div>
                <p>No documents match your search.</p>
            </div>`;
        return;
    }

    const grouped = filtered.reduce((acc, doc) => {
        (acc[doc.category] ??= []).push(doc);
        return acc;
    }, {});

    let html = '';
    categories.filter(c => grouped[c.name]).forEach(catConfig => {
        const docs = grouped[catConfig.name];
        html += `
            <div class="category-group">
                <div class="category-header" style="color:${catConfig.color};">
                    <div class="category-dot" style="background:${catConfig.color};"></div>
                    ${catConfig.name}
                    <span style="opacity:.5;margin-left:4px;">(${docs.length})</span>
                </div>
                ${docs.map(doc => `
                    <div class="doc-item" onclick="loadDoc(${doc.id})" data-id="${doc.id}">
                        <div class="doc-icon">${doc.icon}</div>
                        <div class="doc-info">
                            <div class="doc-title">${doc.title}</div>
                            <div class="doc-meta">
                                <span class="badge" style="background:${catConfig.color}20;color:${catConfig.color};">${doc.category}</span>
                                <span>${doc.size}</span>
                            </div>
                        </div>
                    </div>
                `).join('')}
            </div>`;
    });
    list.innerHTML = html;
}

/* ── LOAD DOC ── */
function loadDoc(id) {
    const doc = documents.find(d => d.id === id);
    if (!doc) return;

    currentDocId = id;

    document.querySelectorAll('.doc-item').forEach(el => el.classList.remove('active'));
    const activeEl = document.querySelector(`[data-id="${id}"]`);
    if (activeEl) activeEl.classList.add('active');

    document.getElementById('currentTitle').textContent = doc.title;
    document.getElementById('toolbarIcon').textContent   = doc.icon;
    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('openBtn').style.display    = 'flex';

    const frame = document.getElementById('doc-frame');
    const fc    = document.getElementById('frameContainer');

    frame.style.display = 'block';
    fc.classList.remove('loaded');

    const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    frame.src = isMobile
        ? `https://docs.google.com/viewer?url=${encodeURIComponent(doc.file)}&embedded=true`
        : doc.file;

    frame.onload = () => fc.classList.add('loaded');

    if (window.innerWidth <= 768) toggleSidebar();
}

function openInNewTab() {
    if (!currentDocId) return;
    const doc = documents.find(d => d.id === currentDocId);
    if (doc) window.open(doc.file, '_blank');
}

function toggleSidebar() {
    const sidebar  = document.getElementById('sidebar');
    const backdrop = document.getElementById('backdrop');
    sidebar.classList.toggle('open');
    if (sidebar.classList.contains('open')) {
        backdrop.classList.add('active');
        document.body.style.overflow = 'hidden';
    } else {
        backdrop.classList.remove('active');
        document.body.style.overflow = '';
    }
}
