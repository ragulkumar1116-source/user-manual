<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="shortcut icon" href="manuals/logo (2).ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AIT Video Training Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">

    <script>
    if (sessionStorage.getItem("verified") !== "true") {
        window.location.replace("index.html");
    }
    window.addEventListener("pageshow", function () {
        if (sessionStorage.getItem("verified") !== "true") {
            window.location.replace("index.html");
        }
    });
    </script>

    <style>
        /* ════════════════════════════════
           DESIGN TOKENS
        ════════════════════════════════ */
        :root {
            --amber:          #f59e0b;
            --amber-dim:      #b45309;
            --amber-glow:     rgba(245,158,11,0.25);
            --amber-glow-lg:  rgba(245,158,11,0.12);

            --bg-deep:        #070b14;
            --bg-dark:        #0d1421;
            --bg-panel:       #111827;
            --bg-card:        #161e2e;
            --bg-card-hover:  #1c2539;

            --border-subtle:  rgba(255,255,255,0.06);
            --border-bright:  rgba(255,255,255,0.12);

            --text-primary:   #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted:     #475569;

            --sidebar-width:  340px;
            --header-height:  68px;

            --radius-sm:  8px;
            --radius-md:  14px;
            --radius-lg:  20px;
            --radius-xl:  28px;

            --transition: 0.22s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ════════════════════════════════
           RESET & BASE
        ════════════════════════════════ */
        *, *::before, *::after {
            margin: 0; padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Outfit', -apple-system, sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            height: 100vh; height: 100dvh;
            overflow: hidden;
            display: grid;
            grid-template-columns: var(--sidebar-width) 1fr;
        }

        /* ════════════════════════════════
           CUSTOM SCROLLBAR
        ════════════════════════════════ */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 2px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--amber-dim); }

        /* ════════════════════════════════
           SIDEBAR
        ════════════════════════════════ */
        .sidebar {
            background: var(--bg-panel);
            border-right: 1px solid var(--border-subtle);
            display: flex;
            flex-direction: column;
            height: 100vh; height: 100dvh;
            position: relative;
            z-index: 10;
        }

        .sidebar::after {
            content: '';
            position: absolute;
            right: 0; top: 20%; bottom: 20%;
            width: 1px;
            background: linear-gradient(to bottom, transparent, var(--amber-dim), transparent);
            opacity: 0.4;
        }

        /* ── Sidebar Header ── */
        .sidebar-header {
            padding: 22px 24px;
            border-bottom: 1px solid var(--border-subtle);
            background: linear-gradient(135deg, rgba(245,158,11,0.08) 0%, transparent 100%);
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
        }

        .sidebar-header::before {
            content: '';
            position: absolute;
            top: -40px; right: -40px;
            width: 120px; height: 120px;
            background: radial-gradient(circle, var(--amber-glow), transparent 70%);
            pointer-events: none;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'Syne', sans-serif;
            font-size: 18px;
            font-weight: 800;
            color: var(--text-primary);
            letter-spacing: -0.3px;
        }

        .logo img { height: 32px; width: 32px; border-radius: 8px; }

        .logo-badge {
            margin-left: auto;
            font-family: 'Outfit', sans-serif;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 3px 8px;
            border-radius: 20px;
            background: var(--amber-glow);
            color: var(--amber);
            border: 1px solid rgba(245,158,11,0.3);
        }

        /* ── Search ── */
        .search-box {
            padding: 14px 18px;
            border-bottom: 1px solid var(--border-subtle);
            flex-shrink: 0;
        }

        .search-inner {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-icon {
            position: absolute;
            left: 13px;
            color: var(--text-muted);
            font-size: 15px;
            pointer-events: none;
        }

        .search-box input {
            width: 100%;
            padding: 11px 14px 11px 38px;
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            font-size: 14px;
            font-family: 'Outfit', sans-serif;
            color: var(--text-primary);
            outline: none;
            transition: border-color var(--transition), box-shadow var(--transition);
        }

        .search-box input::placeholder { color: var(--text-muted); }

        .search-box input:focus {
            border-color: rgba(245,158,11,0.4);
            box-shadow: 0 0 0 3px var(--amber-glow-lg);
        }

        /* ── Filter Tags ── */
        .filter-tags {
            display: flex;
            gap: 7px;
            padding: 12px 18px;
            overflow-x: auto;
            border-bottom: 1px solid var(--border-subtle);
            scrollbar-width: none;
            flex-shrink: 0;
        }
        .filter-tags::-webkit-scrollbar { display: none; }

        .tag {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 11.5px;
            font-weight: 700;
            letter-spacing: 0.3px;
            cursor: pointer;
            white-space: nowrap;
            border: 1.5px solid transparent;
            transition: all var(--transition);
            font-family: 'Outfit', sans-serif;
        }

        .tag:hover { transform: translateY(-1px); }

        .tag.active {
            transform: translateY(-1px);
            box-shadow: 0 4px 14px rgba(0,0,0,0.3);
        }

        /* ── Video List ── */
        .doc-list {
            flex: 1;
            overflow-y: auto;
            padding: 14px;
        }

        .doc-item {
            padding: 14px 16px;
            margin: 6px 0;
            border-radius: var(--radius-md);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 13px;
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            transition: all var(--transition);
            position: relative;
            overflow: hidden;
        }

        .doc-item::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 3px;
            background: transparent;
            border-radius: 0 2px 2px 0;
            transition: background var(--transition);
        }

        .doc-item:hover {
            background: var(--bg-card-hover);
            border-color: var(--border-bright);
            transform: translateX(3px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .doc-item:hover::before { background: var(--amber-dim); }

        .doc-item.active {
            background: linear-gradient(135deg, rgba(245,158,11,0.18) 0%, rgba(245,158,11,0.08) 100%);
            border-color: rgba(245,158,11,0.4);
            transform: translateX(3px);
            box-shadow: 0 0 0 1px rgba(245,158,11,0.15), 0 6px 20px rgba(245,158,11,0.12);
        }

        .doc-item.active::before { background: var(--amber); }

        .doc-icon {
            font-size: 20px;
            width: 40px; height: 40px;
            border-radius: var(--radius-sm);
            background: var(--bg-panel);
            border: 1px solid var(--border-subtle);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all var(--transition);
        }

        .doc-item.active .doc-icon {
            background: rgba(245,158,11,0.15);
            border-color: rgba(245,158,11,0.3);
        }

        .doc-info { min-width: 0; }

        .doc-title {
            font-weight: 600;
            font-size: 13.5px;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: color var(--transition);
        }

        .doc-item.active .doc-title { color: var(--amber); }

        .doc-meta {
            font-size: 11.5px;
            color: var(--text-muted);
            margin-top: 3px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .doc-meta-dot {
            width: 3px; height: 3px;
            border-radius: 50%;
            background: var(--text-muted);
            display: inline-block;
        }

        .doc-arrow {
            margin-left: auto;
            color: var(--text-muted);
            font-size: 12px;
            opacity: 0;
            transform: translateX(-4px);
            transition: all var(--transition);
            flex-shrink: 0;
        }

        .doc-item:hover .doc-arrow,
        .doc-item.active .doc-arrow {
            opacity: 1;
            transform: translateX(0);
            color: var(--amber);
        }

        /* ════════════════════════════════
           VIEWER (RIGHT PANEL)
        ════════════════════════════════ */
        .viewer {
            display: flex;
            flex-direction: column;
            background: var(--bg-deep);
            height: 100vh; height: 100dvh;
            min-height: 0;
        }

        /* ── Viewer Toolbar ── */
        .viewer-toolbar {
            height: var(--header-height);
            flex-shrink: 0;
            background: rgba(13,20,33,0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 28px;
            border-bottom: 1px solid var(--border-subtle);
            gap: 16px;
        }

        .toolbar-left {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }

        .now-playing-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--amber);
            box-shadow: 0 0 8px var(--amber);
            animation: pulse-dot 2s ease-in-out infinite;
            flex-shrink: 0;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: 0.5; transform: scale(0.8); }
        }

        #currentTitle {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 15px;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .toolbar-badge {
            padding: 4px 10px;
            border-radius: 20px;
            background: var(--amber-glow);
            border: 1px solid rgba(245,158,11,0.25);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: var(--amber);
            white-space: nowrap;
            flex-shrink: 0;
        }

        /* ── Frame Container ── */
        .frame-container {
            flex: 1;
            min-height: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 36px;
            position: relative;
            overflow: hidden;
            background:
                linear-gradient(rgba(7,11,20,0.85), rgba(7,11,20,0.85)),
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 39px,
                    rgba(255,255,255,0.025) 39px,
                    rgba(255,255,255,0.025) 40px
                ),
                repeating-linear-gradient(
                    90deg,
                    transparent,
                    transparent 39px,
                    rgba(255,255,255,0.025) 39px,
                    rgba(255,255,255,0.025) 40px
                );
        }

        .frame-container::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse 70% 60% at 50% 50%, rgba(245,158,11,0.05) 0%, transparent 70%);
            pointer-events: none;
        }

        /* ── Empty State ── */
        .empty-state {
            text-align: center;
            color: var(--text-muted);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .empty-icon {
            font-size: 64px;
            filter: grayscale(0.3);
            margin-bottom: 16px;
            display: block;
        }

        .empty-state h2 {
            font-family: 'Syne', sans-serif;
            font-size: 22px;
            font-weight: 800;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .empty-state p {
            font-size: 14px;
            color: var(--text-muted);
        }

        /* ── Video Wrapper ── */
        .video-wrapper {
            width: min(
                100%,
                calc((100dvh - var(--header-height) - 72px) * (16 / 9)),
                1200px
            );
            aspect-ratio: 16 / 9;
            border-radius: var(--radius-xl);
            overflow: hidden;
            position: relative;
            flex-shrink: 0;
            animation: wrapperIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 1.5px solid rgba(245,158,11,0.25);
            box-shadow:
                0 0 0 1px rgba(245,158,11,0.08),
                0 30px 60px -15px rgba(0,0,0,0.8),
                0 0 80px -20px rgba(245,158,11,0.2);
            /* NO ::after scanline — removed to preserve full video quality */
        }

        @keyframes wrapperIn {
            from { opacity: 0; transform: scale(0.96); }
            to   { opacity: 1; transform: scale(1); }
        }

        /* Both players fill the wrapper cleanly */
        iframe,
        .video-wrapper video {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        .video-wrapper video {
            object-fit: contain;
            background: #000;
        }

        /* ════════════════════════════════
           MOBILE HEADER
        ════════════════════════════════ */
        .mobile-header { display: none; }

        /* ════════════════════════════════
           MOBILE
        ════════════════════════════════ */
        @media (max-width: 768px) {
            body { grid-template-columns: 1fr; }

            .sidebar {
                position: fixed;
                left: -100%; width: 88%;
                z-index: 100;
                transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
                box-shadow: 10px 0 40px rgba(0,0,0,0.5);
            }

            .sidebar.open { left: 0; }

            .mobile-header {
                display: flex;
                position: fixed;
                top: 0; width: 100%;
                height: var(--header-height);
                background: rgba(13,20,33,0.97);
                backdrop-filter: blur(20px);
                border-bottom: 1px solid var(--border-subtle);
                z-index: 50;
                padding: 0 20px;
                align-items: center;
                justify-content: space-between;
            }

            .mobile-menu-btn {
                background: var(--bg-card);
                border: 1px solid var(--border-subtle);
                border-radius: var(--radius-sm);
                width: 40px; height: 40px;
                display: flex; align-items: center; justify-content: center;
                font-size: 18px;
                color: var(--text-primary);
                cursor: pointer;
                transition: all var(--transition);
            }

            .mobile-menu-btn:hover {
                border-color: var(--amber-dim);
                color: var(--amber);
            }

            .mobile-logo {
                font-family: 'Syne', sans-serif;
                font-weight: 800;
                font-size: 16px;
                color: var(--amber);
                letter-spacing: -0.3px;
            }

            .viewer {
                margin-top: var(--header-height);
                height: calc(100dvh - var(--header-height));
            }

            .frame-container { padding: 14px; }

            .video-wrapper {
                width: min(
                    100%,
                    calc((100dvh - calc(var(--header-height) * 2) - 28px) * (16 / 9))
                );
                border-radius: var(--radius-lg);
            }

            .sidebar-backdrop {
                display: none;
                position: fixed; inset: 0;
                background: rgba(0,0,0,0.65);
                backdrop-filter: blur(4px);
                z-index: 99;
            }

            .sidebar-backdrop.active { display: block; }
        }

        @media (min-width: 769px) {
            .mobile-header { display: none; }
            .sidebar-backdrop { display: none !important; }
        }

        /* ════════════════════════════════
           ENTRY ANIMATIONS
        ════════════════════════════════ */
        .sidebar-header  { animation: slideDown 0.4s  ease both; }
        .search-box      { animation: slideDown 0.45s ease both; }
        .filter-tags     { animation: slideDown 0.5s  ease both; }
        .doc-list        { animation: slideDown 0.55s ease both; }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .doc-item { animation: itemIn 0.3s ease both; }

        @keyframes itemIn {
            from { opacity: 0; transform: translateX(-6px); }
            to   { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
<body>

    <div class="sidebar-backdrop" id="backdrop" onclick="toggleSidebar()"></div>

    <!-- Mobile Top Bar -->
    <div class="mobile-header">
        <button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>
        <div class="mobile-logo">AIT Video Portal</div>
        <div style="width:40px;"></div>
    </div>

    <!-- ── Sidebar ── -->
    <aside class="sidebar" id="sidebar">

        <div class="sidebar-header">
            <div class="logo">
                <img src="manuals/logo (2).ico" alt="AIT">
                AIT Video
                <span class="logo-badge">PORTAL</span>
            </div>
        </div>

        <div class="search-box">
            <div class="search-inner">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="Search videos…" onkeyup="renderVideos()">
            </div>
        </div>

        <div class="filter-tags" id="filterContainer"></div>
        <div class="doc-list" id="videoList"></div>

    </aside>

    <!-- ── Main Viewer ── -->
    <main class="viewer">

        <div class="viewer-toolbar" id="vToolbar" style="visibility:hidden;">
            <div class="toolbar-left">
                <span class="now-playing-dot"></span>
                <span id="currentTitle">Video Title</span>
            </div>
            <div class="toolbar-badge" id="vDuration">HQ Video</div>
        </div>

        <div class="frame-container">

            <div class="empty-state" id="emptyState">
                <span class="empty-icon">📽️</span>
                <h2>Select a Video</h2>
                <p>Pick a tutorial from the list to begin training</p>
            </div>

            <div class="video-wrapper" id="videoWrapper" style="display:none;">

                <!-- YouTube → iframe -->
                <iframe
                    id="video-frame"
                    allowfullscreen
                    allow="autoplay; encrypted-media"
                    style="display:none;">
                </iframe>

                <!-- MP4 / direct URL → native <video>
                     playsinline prevents iOS full-screen takeover -->
                <video
                    id="video-native"
                    controls
                    playsinline
                    preload="metadata"
                    style="display:none;">
                </video>

            </div>
        </div>

    </main>

    <script>
        const categories = [
            { name: 'All',                  color: '#64748b' },
            { name: 'CCTV Port Forwarding', color: '#ef4444' },
            { name: 'TNPCB Data Download',  color: '#3b82f6' },
            { name: 'RS 485',               color: '#10b981' }
        ];

        const videos = [
            { id: 1, title: 'System Installation Guide', file: 'https://www.youtube.com/embed/l5tLQJJTlNQ',                                                                                                   category: 'CCTV Port Forwarding', duration: '12:45', icon: '🛠️' },
            { id: 2, title: 'TNPCB Data Download',       file: 'https://idfvlhncutvjzzkmsyhk.supabase.co/storage/v1/object/public/documents/Screen%20Recording%202026-04-17%20171350.mp4',                    category: 'TNPCB Data Download',  duration: '05:30', icon: '💻' },
            { id: 3, title: 'RLM-2 Flow Meter',          file: 'https://idfvlhncutvjzzkmsyhk.supabase.co/storage/v1/object/public/documents/km_20260515-1_540p_50f_20260515_212901.mp4',                      category: 'RS 485',               duration: '12:45', icon: '🛠️' },
            { id: 4, title: 'Konsiq',                    file: 'https://idfvlhncutvjzzkmsyhk.supabase.co/storage/v1/object/public/documents/km_20260515_540p_60f_20260515_212659.mp4',                        category: 'RS 485',               duration: '05:30', icon: '💻' }
        ];

        let currentFilter  = 'All';
        let currentVideoId = null;

        function renderFilters() {
            document.getElementById('filterContainer').innerHTML = categories.map(cat => `
                <button class="tag ${cat.name === currentFilter ? 'active' : ''}"
                        onclick="setFilter('${cat.name}')"
                        style="
                            background:   ${cat.name === currentFilter ? cat.color : cat.color + '18'};
                            color:        ${cat.name === currentFilter ? '#fff' : cat.color};
                            border-color: ${cat.color}55;
                        ">
                    ${cat.name}
                </button>
            `).join('');
        }

        function setFilter(name) { currentFilter = name; renderFilters(); renderVideos(); }

        function renderVideos() {
            const search   = document.getElementById('searchInput').value.toLowerCase();
            const filtered = videos.filter(v => {
                const matchesFilter = currentFilter === 'All' || v.category === currentFilter;
                const matchesSearch = v.title.toLowerCase().includes(search);
                return matchesFilter && matchesSearch;
            });

            document.getElementById('videoList').innerHTML = filtered.length
                ? filtered.map((v, i) => `
                    <div class="doc-item ${v.id === currentVideoId ? 'active' : ''}"
                         onclick="loadVideo(${v.id})"
                         style="animation-delay:${i * 40}ms">
                        <div class="doc-icon">${v.icon}</div>
                        <div class="doc-info">
                            <div class="doc-title">${v.title}</div>
                            <div class="doc-meta">
                                <span>${v.category}</span>
                                <span class="doc-meta-dot"></span>
                                <span>${v.duration}</span>
                            </div>
                        </div>
                        <span class="doc-arrow">▶</span>
                    </div>
                `).join('')
                : `<div style="text-align:center;color:var(--text-muted);padding:40px 20px;font-size:13px;">No videos found</div>`;
        }

        function isYouTube(url) {
            return url.includes('youtube.com') || url.includes('youtu.be');
        }

        function loadVideo(id) {
            const video = videos.find(v => v.id === id);
            currentVideoId = id;

            document.getElementById('emptyState').style.display   = 'none';
            document.getElementById('videoWrapper').style.display = 'block';
            document.getElementById('vToolbar').style.visibility  = 'visible';

            const frame  = document.getElementById('video-frame');
            const native = document.getElementById('video-native');

            if (isYouTube(video.file)) {
                native.pause();
                native.removeAttribute('src');
                native.style.display = 'none';
                frame.src = video.file +
                    `?autoplay=1&rel=0&enablejsapi=1&origin=${encodeURIComponent(window.location.origin)}`;
                frame.style.display = 'block';
            } else {
                frame.src = '';
                frame.style.display = 'none';
                native.src = video.file;
                native.style.display = 'block';
                native.load();
                native.play().catch(() => {});
            }

            document.getElementById('currentTitle').textContent = video.title;
            document.getElementById('vDuration').textContent    = `${video.category} · ${video.duration}`;

            if (window.innerWidth <= 768) toggleSidebar(false);
            renderVideos();
        }

        function toggleSidebar(force) {
            const sb   = document.getElementById('sidebar');
            const bd   = document.getElementById('backdrop');
            const open = force !== undefined ? force : !sb.classList.contains('open');
            sb.classList.toggle('open', open);
            bd.classList.toggle('active', open);
        }

        renderFilters();
        renderVideos();
    </script>
</body>
</html>
