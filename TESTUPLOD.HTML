<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Document</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f1f5f9;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 640px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: white;
            padding: 24px;
        }
        .form-container { padding: 24px; }
        .form-group { margin-bottom: 20px; }
        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: #374151;
            margin-bottom: 8px;
        }
        input[type="text"], select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-size: 16px;
            -webkit-appearance: none;
        }
        select[multiple] {
            height: 140px;
            background-image: none;
        }
        select[multiple] option:checked {
            background: #3b82f6;
            color: white;
        }
        .file-input-wrapper {
            position: relative;
            border: 2px dashed #cbd5e1;
            border-radius: 10px;
            padding: 32px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .file-input-wrapper:hover { border-color: #3b82f6; background: #f8fafc; }
        .file-input-wrapper.has-file {
            border-color: #10b981;
            background: #f0fdf4;
        }
        input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        button:disabled {
            background: #93c5fd;
            cursor: not-allowed;
        }
        .status {
            margin-top: 16px;
            padding: 16px;
            border-radius: 10px;
            display: none;
            font-size: 0.9rem;
        }
        .status.show { display: block; }
        .status.success { background: #dcfce7; color: #166534; border: 1px solid #86efac; }
        .status.error { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
        .status.info { background: #dbeafe; color: #1e40af; border: 1px solid #93c5fd; }
        .back-link {
            display: inline-flex;
            margin-bottom: 20px;
            color: #3b82f6;
            text-decoration: none;
            font-weight: 600;
        }
        .debug-info {
            margin-top: 20px;
            padding: 12px;
            background: #f3f4f6;
            border-radius: 8px;
            font-size: 0.75rem;
            color: #6b7280;
            font-family: monospace;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>📤 Upload Document</h1>
        </div>
        
        <div class="form-container">
            <a href="index.html" class="back-link">← Back to Portal</a>
            
            <form id="uploadForm">
                <div class="form-group">
                    <label>Document Title *</label>
                    <input type="text" id="title" required placeholder="Enter document title">
                </div>
                
                <div class="form-group">
                    <label>Category *</label>
                    <select id="category" multiple required>
                        <option value="Manual">Manual</option>
                        <option value="LDM">LDM</option>
                        <option value="OCEMS">OCEMS</option>
                        <option value="Spare list all">Spare list all</option>
                        <option value="Installation Requirements">Installation Requirements</option>
                    </select>
                    <small style="color:#64748b">Hold Ctrl/Cmd to select multiple</small>
                </div>
                
                <div class="form-group">
                    <label>PDF File *</label>
                    <div class="file-input-wrapper" id="dropZone">
                        <input type="file" id="file" accept=".pdf" required>
                        <div id="fileLabel">
                            <strong style="color:#3b82f6">Click to upload PDF</strong><br>
                            <span style="color:#64748b">or drag and drop here</span>
                        </div>
                    </div>
                </div>
                
                <button type="submit" id="submitBtn">Upload to Portal</button>
                
                <div id="status" class="status"></div>
                <div id="debug" class="debug-info"></div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
        // ==========================================
        // REPLACE WITH YOUR CREDENTIALS
        // ==========================================
        const SUPABASE_URL = 'https://idfvlhncutvjzzkmsyhk.supabase.co';
const SUPABASE_ANON_KEY = 'sb_secret_YLwf-CohJEb2WkF2cdv_nA__G4gVx3W';
        const BUCKET_NAME = 'documents'; // Your bucket name
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let uploadCounter = 0;
        
        const form = document.getElementById('uploadForm');
        const fileInput = document.getElementById('file');
        const dropZone = document.getElementById('dropZone');
        const fileLabel = document.getElementById('fileLabel');
        const status = document.getElementById('status');
        const debug = document.getElementById('debug');
        const submitBtn = document.getElementById('submitBtn');
        
        // File selection handler
        fileInput.addEventListener('change', (e) => {
            if (e.target.files && e.target.files[0]) {
                const file = e.target.files[0];
                dropZone.classList.add('has-file');
                fileLabel.innerHTML = `
                    <strong style="color:#10b981">📄 ${file.name}</strong><br>
                    <span style="color:#64748b">${(file.size/1024/1024).toFixed(2)} MB</span>
                `;
                hideStatus();
            }
        });
        
        // Drag & drop
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = '#3b82f6';
        });
        dropZone.addEventListener('dragleave', () => {
            dropZone.style.borderColor = '#cbd5e1';
        });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = '#cbd5e1';
            const files = e.dataTransfer.files;
            if (files.length && files[0].type === 'application/pdf') {
                fileInput.files = files;
                const file = files[0];
                dropZone.classList.add('has-file');
                fileLabel.innerHTML = `
                    <strong style="color:#10b981">📄 ${file.name}</strong><br>
                    <span style="color:#64748b">${(file.size/1024/1024).toFixed(2)} MB</span>
                `;
            }
        });
        
        // Upload handler
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            uploadCounter++;
            
            const title = document.getElementById('title').value.trim();
            const categorySelect = document.getElementById('category');
            const file = fileInput.files[0];
            
            // Validation
            if (!file) {
                showStatus('Please select a PDF file', 'error');
                return;
            }
            
            const selectedOptions = Array.from(categorySelect.selectedOptions);
            if (selectedOptions.length === 0) {
                showStatus('Please select at least one category', 'error');
                return;
            }
            
            const categories = selectedOptions.map(opt => opt.value);
            
            // UI Loading
            submitBtn.disabled = true;
            submitBtn.textContent = 'Uploading...';
            hideStatus();
            debug.style.display = 'none';
            
            try {
                // Generate TRULY unique filename
                const timestamp = Date.now();
                const random = Math.random().toString(36).substring(2, 15);
                const counter = uploadCounter;
                const safeTitle = title.replace(/[^a-z0-9]/gi, '_').substring(0, 20);
                const filePath = `uploads/${timestamp}_${counter}_${random}_${safeTitle}.pdf`;
                
                console.log('Uploading to:', filePath);
                
                // 1. Upload to Storage
                const { data: uploadData, error: uploadError } = await supabase
                    .storage
                    .from(BUCKET_NAME)
                    .upload(filePath, file, {
                        contentType: 'application/pdf',
                        upsert: false // Prevent overwriting
                    });
                
                if (uploadError) {
                    throw new Error(`Storage error: ${uploadError.message}`);
                }
                
                // 2. Get URL
                const { data: { publicUrl } } = supabase
                    .storage
                    .from(BUCKET_NAME)
                    .getPublicUrl(filePath);
                
                console.log('Public URL:', publicUrl);
                
                // 3. Insert to Database
                // IMPORTANT: If your category column is TEXT (not array), change 'categories' to 'categories.join(", ")'
                const insertData = {
                    title: title,
                    file: publicUrl,
                    category: categories, // Use categories.join(", ") if column is TEXT
                    size: (file.size / (1024*1024)).toFixed(2) + ' MB',
                    icon: '📄',
                    created_at: new Date().toISOString()
                };
                
                console.log('Inserting:', insertData);
                
                const { error: dbError } = await supabase
                    .from('documents')
                    .insert([insertData]);
                
                if (dbError) {
                    // If DB fails, try to delete the uploaded file (cleanup)
                    await supabase.storage.from(BUCKET_NAME).remove([filePath]);
                    throw new Error(`Database error: ${dbError.message}`);
                }
                
                // Success
                showStatus('✅ Upload successful! Document will appear in portal immediately.', 'success');
                
                // Reset form properly
                form.reset();
                dropZone.classList.remove('has-file');
                fileLabel.innerHTML = `
                    <strong style="color:#3b82f6">Click to upload PDF</strong><br>
                    <span style="color:#64748b">or drag and drop here</span>
                `;
                
                // Clear file input completely (important!)
                fileInput.value = '';
                
            } catch (err) {
                console.error('Full error:', err);
                showStatus('❌ ' + err.message, 'error');
                
                // Show debug info
                debug.style.display = 'block';
                debug.innerHTML = `
                    Error: ${err.message}<br>
                    Time: ${new Date().toLocaleTimeString()}<br>
                    Check browser console (F12) for details
                `;
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Upload to Portal';
            }
        });
        
        function showStatus(msg, type) {
            status.textContent = msg;
            status.className = 'status ' + type + ' show';
        }
        function hideStatus() {
            status.className = 'status';
        }
        
        // Check connection on load
        async function checkConnection() {
            const { error } = await supabase.from('documents').select('count', { count: 'exact', head: true });
            if (error) {
                console.error('Connection error:', error);
                showStatus('⚠️ Database connection issue. Check RLS policies.', 'error');
            } else {
                console.log('Connected to Supabase');
            }
        }
        checkConnection();
    </script>
</body>
</html>
