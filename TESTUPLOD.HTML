<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Document</title>

<style>
/* YOUR UI EXACTLY SAME (UNCHANGED) */
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:sans-serif;background:#f1f5f9;padding:20px}
.container{max-width:640px;margin:auto;background:#fff;border-radius:16px}
.header{background:#0f172a;color:#fff;padding:20px}
.form-container{padding:20px}
button{width:100%;padding:14px;background:#3b82f6;color:#fff;border:none;border-radius:10px}
.status{margin-top:10px;padding:10px;border-radius:8px;display:none}
.status.show{display:block}
.status.success{background:#dcfce7;color:#166534}
.status.error{background:#fee2e2;color:#991b1b}
</style>
</head>

<body>

<div class="container">
<div class="header">📤 Upload Document</div>

<div class="form-container">
<form id="uploadForm">

<input type="text" id="title" placeholder="Document Title" required><br><br>

<select id="category" multiple required>
<option value="Manual">Manual</option>
<option value="LDM">LDM</option>
<option value="OCEMS">OCEMS</option>
</select><br><br>

<input type="file" id="file" accept=".pdf" required><br><br>

<button type="submit">Upload</button>

<div id="status" class="status"></div>

</form>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// ✅ CONFIG
const SUPABASE_URL = 'https://idfvlhncutvjzzkmsyhk.supabase.co';
const SUPABASE_ANON_KEY = 'sb_secret_YLwf-CohJEb2WkF2cdv_nA__G4gVx3W'; // 🔐 PUT REAL ANON KEY HERE
const BUCKET_NAME = 'documents';

// ✅ FIXED CLIENT (NO ERROR)
const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// UI
const form = document.getElementById('uploadForm');
const status = document.getElementById('status');

form.addEventListener('submit', async (e) => {
e.preventDefault();

const title = document.getElementById('title').value.trim();
const file = document.getElementById('file').files[0];
const categories = Array.from(document.getElementById('category').selectedOptions).map(o=>o.value);

if(!file){
showStatus("Select file","error");
return;
}

try {

// unique file name
const filePath = `uploads/${Date.now()}_${file.name}`;

// 📤 upload
const { error: uploadError } = await client.storage
.from(BUCKET_NAME)
.upload(filePath, file);

if(uploadError) throw uploadError;

// 🌐 public URL
const { data } = client.storage
.from(BUCKET_NAME)
.getPublicUrl(filePath);

// 💾 insert DB
const { error: dbError } = await client
.from('documents')
.insert([{
title,
file: data.publicUrl,
category: categories,
size: (file.size/1024/1024).toFixed(2)+' MB'
}]);

if(dbError) throw dbError;

showStatus("✅ Upload Success","success");
form.reset();

} catch(err){
showStatus("❌ "+err.message,"error");
}
});

function showStatus(msg,type){
status.innerText = msg;
status.className = "status show "+type;
}
</script>

</body>
</html>
