<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Upload Document - Enterprise Portal</title>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f1f5f9;
            padding: 20px;
            min-height: 100vh;
            min-height: 100dvh;
        }
        
        .container {
            max-width: 640px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: white;
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .header-icon {
            font-size: 24px;
        }
        
        .header h1 {
            font-size: 1.25rem;
            font-weight: 600;
        }
        
        .form-container {
            padding: 24px;
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        
        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: #374151;
            margin-bottom: 8px;
        }
        
        input[type="text"],
        select,
        input[type="file"] {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-size: 16px; /* Prevents zoom on iOS */
            font-family: inherit;
            background: white;
            transition: all 0.2s;
            -webkit-appearance: none;
        }
        
        input[type="text"]:focus,
        select:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        
        select {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 12px center;
            background-repeat: no-repeat;
            background-size: 20px;
            padding-right: 40px;
        }
        
        select[multiple] {
            background-image: none;
            height: 140px;
            padding: 8px;
        }
        
        select[multiple] option {
            padding: 10px;
            margin: 2px 0;
            border-radius: 6px;
        }
        
        select[multiple] option:checked {
            background: #3b82f6 linear-gradient(0deg, #3b82f6 0%, #3b82f6 100%);
            color: white;
        }
        
        .hint {
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 6px;
            display: block;
        }
        
        .file-input-wrapper {
            position: relative;
            border: 2px dashed #cbd5e1;
            border-radius: 10px;
            padding: 24px;
            text-align: center;
            transition: all 0.2s;
            cursor: pointer;
        }
        
        .file-input-wrapper:hover {
            border-color: #3b82f6;
            background: #f8fafc;
        }
        
        .file-input-wrapper.has-file {
            border-color: #10b981;
            background: #f0fdf4;
        }
        
        input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }
        
        .file-label-text {
            color: #64748b;
            font-size: 0.9rem;
            pointer-events: none;
        }
        
        .file-label-text strong {
            color: #3b82f6;
            display: block;
            margin-bottom: 4px;
            font-size: 1rem;
        }
        
        button[type="submit"] {
            width: 100%;
            padding: 14px 24px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            touch-action: manipulation;
        }
        
        button[type="submit"]:active {
            transform: scale(0.98);
        }
        
        button[type="submit"]:disabled {
            background: #93c5fd;
            cursor: not-allowed;
            transform: none;
        }
        
        .status {
            margin-top: 20px;
            padding: 16px;
            border-radius: 10px;
            display: none;
            font-size: 0.9rem;
            line-height: 1.5;
        }
        
        .status.show {
            display: block;
        }
        
        .status.success {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #86efac;
        }
        
        .status.error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a5;
        }
        
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #3b82f6;
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 20px;
            font-size: 0.9rem;
            padding: 8px 0;
        }
        
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @media (max-width: 640px) {
            body { padding: 0; }
            .container { border-radius: 0; min-height: 100dvh; }
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-link">← Back to Portal</a>
    
    <div class="container">
        <div class="header">
            <span class="header-icon">📤</span>
            <h1>Upload Document</h1>
        </div>
        
        <div class="form-container">
            <form id="uploadForm">
                <div class="form-group">
                    <label for="title">Document Title *</label>
                    <input type="text" id="title" required placeholder="e.g., AAD-CEMS-200 User Manual">
                </div>
                
                <div class="form-group">
                    <label for="category">Category *</label>
                    <select id="category" multiple required>
                        <option value="Manual">Manual</option>
                        <option value="LDM">LDM</option>
                        <option value="OCEMS">OCEMS</option>
                        <option value="Spare list all">Spare list all</option>
                        <option value="Installation Requirements">Installation Requirements</option>
                    </select>
                    <span class="hint">Hold Ctrl/Cmd to select multiple categories</span>
                </div>
                
                <div class="form-group">
                    <label>PDF File *</label>
                    <div class="file-input-wrapper" id="dropZone">
                        <input type="file" id="file" accept=".pdf" required>
                        <div class="file-label-text">
                            <strong>Click to upload PDF</strong>
                            <span id="fileName">or drag and drop here</span>
                        </div>
                    </div>
                </div>
                
                <button type="submit" id="submitBtn">
                    <span>Upload to Portal</span>
                </button>
                
                <div id="status" class="status"></div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
        // CONFIGURATION: Must match your main app credentials
        const SUPABASE_URL = 'https://idfvlhncutvjzzkmsyhk.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_secret_YLwf-CohJEb2WkF2cdv_nA__G4gVx3W';
        const BUCKET_NAME = 'documents'; // Change to your storage bucket name
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        const form = document.getElementById('uploadForm');
        const submitBtn = document.getElementById('submitBtn');
        const status = document.getElementById('status');
        const fileInput = document.getElementById('file');
        const dropZone = document.getElementById('dropZone');
        const fileName = document.getElementById('fileName');
        
        // File selection feedback
        fileInput.addEventListener('change', (e) => {
            if (e.target.files && e.target.files[0]) {
                dropZone.classList.add('has-file');
                fileName.textContent = e.target.files[0].name;
            }
        });
        
        // Drag and drop support
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = '#3b82f6';
        });
        
        dropZone.addEventListener('dragleave', () => {
            dropZone.style.borderColor = '';
        });
        
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = '';
            const files = e.dataTransfer.files;
            if (files.length && files[0].type === 'application/pdf') {
                fileInput.files = files;
                dropZone.classList.add('has-file');
                fileName.textContent = files[0].name;
            }
        });
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const title = document.getElementById('title').value.trim();
            const categorySelect = document.getElementById('category');
            const file = fileInput.files[0];
            
            // Validation
            if (!file) {
                showStatus('Please select a PDF file', 'error');
                return;
            }
            
            if (file.type !== 'application/pdf') {
                showStatus('Only PDF files are allowed', 'error');
                return;
            }
            
            // Get selected categories
            const selectedOptions = Array.from(categorySelect.selectedOptions);
            if (selectedOptions.length === 0) {
                showStatus('Please select at least one category', 'error');
                return;
            }
            
            const categories = selectedOptions.map(opt => opt.value);
            
            // UI Loading state
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner"></span> Uploading...';
            hideStatus();
            
            try {
                // Generate unique filename
                const timestamp = Date.now();
                const randomStr = Math.random().toString(36).substring(2, 10);
                const fileExt = file.name.split('.').pop();
                const filePath = `uploads/${timestamp}_${randomStr}.${fileExt}`;
                
                // Upload to Supabase Storage
                const { data: uploadData, error: uploadError } = await supabase
                    .storage
                    .from(BUCKET_NAME)
                    .upload(filePath, file, {
                        contentType: 'application/pdf',
                        cacheControl: '3600'
                    });
                
                if (uploadError) throw uploadError;
                
                // Get public URL
                const { data: { publicUrl } } = supabase
                    .storage
                    .from(BUCKET_NAME)
                    .getPublicUrl(filePath);
                
                // Insert metadata into documents table
                // Note: If your category column is text type, use categories.join(', ') instead
                const { error: dbError } = await supabase
                    .from('documents')
                    .insert([
                        {
                            title: title,
                            file: publicUrl,
                            category: categories, // Use .join(', ') if column is text type
                            size: (file.size / (1024 * 1024)).toFixed(2) + ' MB',
                            icon: '📄',
                            created_at: new Date().toISOString()
                        }
                    ]);
                
                if (dbError) throw dbError;
                
                // Success
                showStatus('✅ Document uploaded successfully! It will appear in the portal immediately.', 'success');
                form.reset();
                dropZone.classList.remove('has-file');
                fileName.textContent = 'or drag and drop here';
                
            } catch (err) {
                console.error('Upload error:', err);
                showStatus('❌ Error: ' + (err.message || 'Upload failed'), 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<span>Upload to Portal</span>';
            }
        });
        
        function showStatus(message, type) {
            status.textContent = message;
            status.className = 'status ' + type + ' show';
        }
        
        function hideStatus() {
            status.className = 'status';
        }
        
        // Security check (optional - remove if not needed)
        if (sessionStorage.getItem("verified") !== "true") {
            // Uncomment next line to enforce login
            // window.location.href = "index.html";
        }
    </script>
</body>
</html>
